        <!-- Voice Pipeline (replaces ElevenLabs SDK) -->
        <script>
            console.log('Voice pipeline JS loaded');

            window._voiceWs = null;
            window._voiceMicStream = null;
            window._voiceAudioCtx = null;
            window._voiceScriptNode = null;
            window._voiceCallStartTime = null;
            window._voiceCallStatus = 'disconnected';
            window._voicePlaybackQueue = [];
            window._voiceCurrentSampleRate = 24000;

            // Keep old function names so Yew frontend works unchanged
            window.startElevenLabsCall = async function(signedUrl, overrides) {
                // signedUrl is now the WS URL with user_id param
                console.log('startElevenLabsCall (voice pipeline) called');
                try {
                    console.log('Requesting microphone...');
                    window._voiceMicStream = await navigator.mediaDevices.getUserMedia({
                        audio: { sampleRate: 16000, channelCount: 1, echoCancellation: true, noiseSuppression: true }
                    });
                    console.log('Mic granted');

                    window._voiceCallStatus = 'connecting';
                    window._voiceCallStartTime = Date.now();

                    // Set up AudioContext at 16kHz for mic capture
                    window._voiceAudioCtx = new AudioContext({ sampleRate: 16000 });
                    const source = window._voiceAudioCtx.createMediaStreamSource(window._voiceMicStream);
                    window._voiceScriptNode = window._voiceAudioCtx.createScriptProcessor(4096, 1, 1);

                    // Connect WebSocket
                    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
                    const wsUrl = signedUrl.startsWith('ws') ? signedUrl : `${proto}//${location.host}${signedUrl}`;
                    console.log('Connecting WS:', wsUrl);
                    window._voiceWs = new WebSocket(wsUrl);
                    window._voiceWs.binaryType = 'arraybuffer';

                    window._voiceWs.onopen = () => {
                        console.log('Voice WS connected');
                        window._voiceCallStatus = 'connected';
                    };

                    window._voiceWs.onmessage = (evt) => {
                        if (typeof evt.data === 'string') {
                            const msg = JSON.parse(evt.data);
                            if (msg.type === 'audio_start') {
                                window._voiceCurrentSampleRate = msg.sample_rate || 24000;
                                window._voicePlaybackQueue = [];
                            } else if (msg.type === 'audio_end') {
                                window._voicePlayAudio();
                            } else if (msg.type === 'error') {
                                console.error('Voice pipeline error:', msg.message);
                            } else if (msg.type === 'vad') {
                                console.log('VAD:', msg.speaking ? 'speaking' : 'silent', msg.processing ? '(processing)' : '');
                            }
                        } else {
                            // Binary: PCM i16 audio
                            window._voicePlaybackQueue.push(new Int16Array(evt.data));
                        }
                    };

                    window._voiceWs.onclose = () => {
                        console.log('Voice WS closed');
                        window._voiceCallStatus = 'disconnected';
                        window._voiceCleanup();
                    };

                    window._voiceWs.onerror = (e) => {
                        console.error('Voice WS error:', e);
                        window._voiceCallStatus = 'error';
                    };

                    // Send mic audio as binary PCM i16 chunks
                    window._voiceScriptNode.onaudioprocess = (e) => {
                        if (!window._voiceWs || window._voiceWs.readyState !== WebSocket.OPEN) return;
                        const f32 = e.inputBuffer.getChannelData(0);
                        const i16 = new Int16Array(f32.length);
                        for (let i = 0; i < f32.length; i++) {
                            i16[i] = Math.max(-32768, Math.min(32767, Math.round(f32[i] * 32767)));
                        }
                        window._voiceWs.send(i16.buffer);
                    };
                    source.connect(window._voiceScriptNode);
                    window._voiceScriptNode.connect(window._voiceAudioCtx.destination);

                    return true;
                } catch (error) {
                    console.error('Failed to start voice call:', error);
                    window._voiceCallStatus = 'error';
                    window._voiceCallStartTime = null;
                    window._voiceCleanup();
                    return false;
                }
            };

            window._voicePlaybackCtx = null;
            window._voicePlaybackSrc = null;

            window._voicePlayAudio = function() {
                const queue = window._voicePlaybackQueue;
                if (!queue.length) return;

                // Stop any currently playing audio
                if (window._voicePlaybackSrc) {
                    try { window._voicePlaybackSrc.stop(); } catch(e) {}
                    window._voicePlaybackSrc = null;
                }
                if (window._voicePlaybackCtx) {
                    window._voicePlaybackCtx.close().catch(()=>{});
                    window._voicePlaybackCtx = null;
                }

                let totalLen = 0;
                for (const c of queue) totalLen += c.length;
                const merged = new Float32Array(totalLen);
                let off = 0;
                for (const c of queue) {
                    for (let i = 0; i < c.length; i++) merged[off++] = c[i] / 32768.0;
                }
                window._voicePlaybackQueue = [];
                const sr = window._voiceCurrentSampleRate;
                const ctx = new AudioContext({ sampleRate: sr });
                window._voicePlaybackCtx = ctx;
                const buf = ctx.createBuffer(1, merged.length, sr);
                buf.getChannelData(0).set(merged);
                const src = ctx.createBufferSource();
                window._voicePlaybackSrc = src;
                src.buffer = buf;
                src.connect(ctx.destination);
                src.onended = () => {
                    window._voicePlaybackSrc = null;
                    ctx.close().catch(()=>{});
                    window._voicePlaybackCtx = null;
                };
                src.start();
            };

            window._voiceCleanup = function() {
                if (window._voiceScriptNode) { window._voiceScriptNode.disconnect(); window._voiceScriptNode = null; }
                if (window._voiceMicStream) { window._voiceMicStream.getTracks().forEach(t => t.stop()); window._voiceMicStream = null; }
                if (window._voiceAudioCtx) { window._voiceAudioCtx.close().catch(()=>{}); window._voiceAudioCtx = null; }
            };

            window.endElevenLabsCall = async function() {
                console.log('endElevenLabsCall (voice pipeline) called');
                if (window._voiceWs) {
                    window._voiceWs.close();
                    window._voiceWs = null;
                }
                window._voiceCleanup();
                const duration = window.getElevenLabsCallDuration();
                window._voiceCallStartTime = null;
                window._voiceCallStatus = 'disconnected';
                return duration;
            };

            window.getElevenLabsCallDuration = function() {
                if (!window._voiceCallStartTime) return 0;
                return Math.floor((Date.now() - window._voiceCallStartTime) / 1000);
            };

            window.isElevenLabsCallActive = function() {
                return window._voiceCallStatus === 'connected' || window._voiceCallStatus === 'connecting';
            };

            window.getElevenLabsCallStatus = function() {
                return window._voiceCallStatus;
            };

            window.setElevenLabsStatusCallback = function(callback) {
                // Not used in new pipeline but keep for compatibility
            };
        </script>
