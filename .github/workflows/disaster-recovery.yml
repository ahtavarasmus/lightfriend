name: Disaster Recovery

# Manual trigger only - Actions tab -> select workflow -> "Run workflow"
on:
  workflow_dispatch:
    inputs:
      scenario:
        description: 'Recovery type'
        required: true
        type: choice
        options:
          - 'Restore from latest S3 backup'
          - 'Restore from Cloudflare R2 backup'
          - 'Restore from seed SQL (fresh database)'
          - 'Fresh start (empty database)'
      backup_key:
        description: 'Specific backup key (optional - leave empty for latest)'
        required: false
        type: string

concurrency:
  group: disaster-recovery
  cancel-in-progress: false

env:
  REGISTRY: docker.io
  IMAGE_REPO: docker.io/ahtavarasmus/lightfriend-enclave

jobs:
  authorize:
    runs-on: ubuntu-latest
    steps:
      - name: Check actor is repo admin
        run: |
          PERMISSION=$(gh api "repos/${{ github.repository }}/collaborators/${{ github.actor }}/permission" --jq '.permission')
          if [ "$PERMISSION" != "admin" ]; then
            echo "FATAL: Only repo admins can trigger disaster recovery (actor: ${{ github.actor }}, permission: $PERMISSION)"
            exit 1
          fi
        env:
          GH_TOKEN: ${{ github.token }}

  build-and-push:
    needs: authorize
    runs-on: ubuntu-latest
    outputs:
      image_digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
      - run: sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc && sudo apt-get clean
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_REPO }}
      - uses: docker/build-push-action@v5
        id: build
        with:
          context: .
          file: enclave/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.IMAGE_REPO }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_REPO }}:buildcache,mode=max
          build-args: BUILD_MODE=production
      - id: output
        run: |
          IMAGE_REF="${{ env.IMAGE_REPO }}@${{ steps.build.outputs.digest }}"
          echo "{\"image_repo\":\"${{ env.IMAGE_REPO }}\",\"image_digest\":\"${{ steps.build.outputs.digest }}\",\"image_ref\":\"$IMAGE_REF\",\"commit_sha\":\"${{ github.sha }}\"}" > image-build.json
      - uses: actions/upload-artifact@v4
        with:
          name: image-build-${{ github.sha }}
          path: image-build.json

  build-eif:
    needs: build-and-push
    runs-on: ubuntu-latest
    outputs:
      eif_key: ${{ steps.publish.outputs.eif_key }}
      eif_sha256: ${{ steps.publish.outputs.eif_sha256 }}
      pcr0: ${{ steps.publish.outputs.pcr0 }}
      pcr1: ${{ steps.publish.outputs.pcr1 }}
      pcr2: ${{ steps.publish.outputs.pcr2 }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: image-build-${{ github.sha }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1
      - name: Install Nitro CLI
        run: |
          sudo apt-get update && sudo apt-get install -y build-essential cmake libssl-dev
          git clone --depth 1 https://github.com/aws/aws-nitro-enclaves-cli.git /tmp/nitro-cli
          cd /tmp/nitro-cli && cargo build --release -p aws-nitro-enclaves-cli
          sudo cp target/release/nitro-cli /usr/local/bin/
          sudo mkdir -p /usr/share/nitro_enclaves/blobs
          for blob in bzImage init linuxkit cmdline; do
            sudo touch /usr/share/nitro_enclaves/blobs/$blob
            curl -sL "https://github.com/aws/aws-nitro-enclaves-cli/releases/latest/download/$blob" \
              -o "/usr/share/nitro_enclaves/blobs/$blob" 2>/dev/null || true
          done
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build EIF
        id: eif
        run: |
          IMAGE_REF=$(jq -r '.image_ref' image-build.json)
          docker pull "$IMAGE_REF"
          nitro-cli build-enclave --docker-uri "$IMAGE_REF" --output-file lightfriend.eif 2>&1 | tee eif-output.log
          [ -f lightfriend.eif ] || { echo "FATAL: nitro-cli did not produce lightfriend.eif"; tail -50 eif-output.log; exit 1; }
          sed -n '/^{/,/^}$/p' eif-output.log > eif-measurements.json
          echo "eif_sha256=$(sha256sum lightfriend.eif | awk '{print $1}')" >> $GITHUB_OUTPUT
          PCR0=$(jq -r '.Measurements.PCR0 // empty' eif-measurements.json | tr '[:upper:]' '[:lower:]')
          PCR1=$(jq -r '.Measurements.PCR1 // empty' eif-measurements.json | tr '[:upper:]' '[:lower:]')
          PCR2=$(jq -r '.Measurements.PCR2 // empty' eif-measurements.json | tr '[:upper:]' '[:lower:]')
          [ -n "$PCR0" ] || { echo "FATAL: Missing PCR0 from nitro-cli output"; cat eif-output.log; exit 1; }
          [ -n "$PCR1" ] || { echo "FATAL: Missing PCR1"; exit 1; }
          [ -n "$PCR2" ] || { echo "FATAL: Missing PCR2"; exit 1; }
          echo "pcr0=0x$PCR0" >> $GITHUB_OUTPUT
          echo "pcr1=0x$PCR1" >> $GITHUB_OUTPUT
          echo "pcr2=0x$PCR2" >> $GITHUB_OUTPUT
      - name: Publish EIF
        id: publish
        run: |
          S3_BUCKET=$(aws ssm get-parameter --name /lightfriend/s3-bucket --query Parameter.Value --output text)
          EIF_KEY="eif/${{ github.sha }}/lightfriend.eif"
          aws s3 cp lightfriend.eif "s3://$S3_BUCKET/$EIF_KEY"
          echo "eif_key=$EIF_KEY" >> $GITHUB_OUTPUT
          echo "eif_sha256=${{ steps.eif.outputs.eif_sha256 }}" >> $GITHUB_OUTPUT
          echo "pcr0=${{ steps.eif.outputs.pcr0 }}" >> $GITHUB_OUTPUT
          echo "pcr1=${{ steps.eif.outputs.pcr1 }}" >> $GITHUB_OUTPUT
          echo "pcr2=${{ steps.eif.outputs.pcr2 }}" >> $GITHUB_OUTPUT

  recover:
    needs: [build-and-push, build-eif]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1
      - uses: foundry-rs/foundry-toolchain@v1

      - name: Read infrastructure
        id: infra
        run: |
          S3_BUCKET=$(aws ssm get-parameter --name /lightfriend/s3-bucket --query Parameter.Value --output text)
          LT_ID=$(aws ssm get-parameter --name /lightfriend/launch-template-id --query Parameter.Value --output text)
          echo "s3_bucket=$S3_BUCKET" >> $GITHUB_OUTPUT
          echo "lt_id=$LT_ID" >> $GITHUB_OUTPUT

      - name: Prepare data source
        id: data
        run: |
          S3_BUCKET="${{ steps.infra.outputs.s3_bucket }}"
          SCENARIO="${{ inputs.scenario }}"
          SPECIFIC_KEY="${{ inputs.backup_key }}"

          echo "## Recovery: $SCENARIO" >> $GITHUB_STEP_SUMMARY

          BACKUP_KEY=""

          if [ "$SCENARIO" = "Fresh start (empty database)" ]; then
            echo "mode=fresh" >> $GITHUB_OUTPUT
            echo "No backup - fresh start"
            exit 0
          fi

          if [ "$SCENARIO" = "Restore from seed SQL (fresh database)" ]; then
            # Verify seed exists
            aws s3api head-object --bucket "$S3_BUCKET" --key "seed/lightfriend_db.sql" || {
              echo "FATAL: No seed/lightfriend_db.sql in S3. Upload it first."
              exit 1
            }
            echo "mode=seed" >> $GITHUB_OUTPUT
            echo "Seed SQL found"
            exit 0
          fi

          # Find backup (S3 or R2)
          if [ -n "$SPECIFIC_KEY" ]; then
            BACKUP_KEY="$SPECIFIC_KEY"
          elif echo "$SCENARIO" | grep -q "R2"; then
            # Download from R2, upload to S3
            ENV_FILE=$(aws s3 cp "s3://$S3_BUCKET/config/.env" - 2>/dev/null)
            R2_BUCKET=$(echo "$ENV_FILE" | grep R2_BACKUP_BUCKET | cut -d= -f2)
            R2_ENDPOINT=$(echo "$ENV_FILE" | grep R2_ENDPOINT_URL | cut -d= -f2)
            R2_ACCESS=$(echo "$ENV_FILE" | grep R2_ACCESS_KEY_ID | cut -d= -f2)
            R2_SECRET=$(echo "$ENV_FILE" | grep R2_SECRET_ACCESS_KEY | cut -d= -f2)

            R2_KEY=$(AWS_ACCESS_KEY_ID="$R2_ACCESS" AWS_SECRET_ACCESS_KEY="$R2_SECRET" \
              aws s3 ls "s3://$R2_BUCKET/" --recursive --endpoint-url "$R2_ENDPOINT" 2>/dev/null | \
              grep '\.tar\.gz\.enc$' | sort -k1,2 | tail -1 | awk '{print $4}')
            [ -n "$R2_KEY" ] || { echo "FATAL: No backups in R2"; exit 1; }

            TMP=$(mktemp /tmp/r2-backup.XXXXXX.enc)
            AWS_ACCESS_KEY_ID="$R2_ACCESS" AWS_SECRET_ACCESS_KEY="$R2_SECRET" \
              aws s3 cp "s3://$R2_BUCKET/$R2_KEY" "$TMP" --endpoint-url "$R2_ENDPOINT"
            BACKUP_KEY="backups/recovery/$(basename $R2_KEY)"
            aws s3 cp "$TMP" "s3://$S3_BUCKET/$BACKUP_KEY"
            rm -f "$TMP"
          else
            # Latest S3 backup
            for PREFIX in "backups/deploy/" "backups/hourly/" "backups/daily/"; do
              BACKUP_KEY=$(aws s3 ls "s3://$S3_BUCKET/$PREFIX" --recursive 2>/dev/null | \
                grep '\.tar\.gz\.enc$' | sort -k1,2 | tail -1 | awk '{print $4}')
              [ -n "$BACKUP_KEY" ] && break
            done
            [ -n "$BACKUP_KEY" ] || { echo "FATAL: No backups in S3"; exit 1; }
          fi

          # Validate backup size
          BACKUP_SIZE=$(aws s3api head-object --bucket "$S3_BUCKET" --key "$BACKUP_KEY" \
            --query 'ContentLength' --output text 2>/dev/null || echo "0")
          if [ "$BACKUP_SIZE" = "0" ] || [ -z "$BACKUP_SIZE" ]; then
            echo "FATAL: Backup file is empty or missing: $BACKUP_KEY"
            exit 1
          fi
          if [ "$BACKUP_SIZE" -lt 1048576 ]; then
            echo "::warning::Backup is suspiciously small ($BACKUP_SIZE bytes)"
          fi

          # Check backup age
          LAST_MOD=$(aws s3api head-object --bucket "$S3_BUCKET" --key "$BACKUP_KEY" \
            --query 'LastModified' --output text 2>/dev/null || echo "")
          if [ -n "$LAST_MOD" ]; then
            BACKUP_EPOCH=$(date -d "$LAST_MOD" +%s 2>/dev/null || echo "0")
            NOW_EPOCH=$(date +%s)
            if [ "$BACKUP_EPOCH" -gt 0 ]; then
              HOURS_OLD=$(( (NOW_EPOCH - BACKUP_EPOCH) / 3600 ))
              echo "Backup age: ${HOURS_OLD}h"
              if [ "$HOURS_OLD" -gt 168 ]; then
                echo "::warning::Backup is ${HOURS_OLD}h old (>7 days). Significant data loss likely."
              elif [ "$HOURS_OLD" -gt 24 ]; then
                echo "::warning::Backup is ${HOURS_OLD}h old (>24h). Some data loss possible."
              fi
              echo "Backup age: ${HOURS_OLD}h" >> $GITHUB_STEP_SUMMARY
            fi
          fi

          echo "mode=backup" >> $GITHUB_OUTPUT
          echo "backup_key=$BACKUP_KEY" >> $GITHUB_OUTPUT
          echo "Backup: $BACKUP_KEY ($BACKUP_SIZE bytes)" >> $GITHUB_STEP_SUMMARY

      - name: Clean stale deploy signals
        run: |
          S3_BUCKET="${{ steps.infra.outputs.s3_bucket }}"
          aws s3 rm "s3://$S3_BUCKET/deploy/export-complete.json" 2>/dev/null || true
          for prefix in eif- pre-warm- restore- verify-; do
            aws s3 ls "s3://$S3_BUCKET/deploy/${prefix}" 2>/dev/null | awk '{print $4}' | while read -r key; do
              [ -n "$key" ] && aws s3 rm "s3://$S3_BUCKET/deploy/$key" 2>/dev/null || true
            done
          done

      - name: Launch new EC2 instance
        id: launch
        run: |
          S3_BUCKET="${{ steps.infra.outputs.s3_bucket }}"
          LT_ID="${{ steps.infra.outputs.lt_id }}"
          EIF_KEY="${{ needs.build-eif.outputs.eif_key }}"

          INSTANCE_ID=$(aws ec2 run-instances \
            --launch-template LaunchTemplateId=$LT_ID \
            --tag-specifications "ResourceType=instance,Tags=[{Key=Name,Value=lightfriend-recovery-${{ github.run_id }}},{Key=deploy,Value=recovery-${{ github.run_id }}}]" \
            --query 'Instances[0].InstanceId' --output text)

          echo "new_instance=$INSTANCE_ID" >> $GITHUB_OUTPUT
          echo "Launched: $INSTANCE_ID"

          aws ec2 wait instance-status-ok --instance-ids "$INSTANCE_ID" --cli-read-timeout 300 || true

          cat <<EOF | aws s3 cp - "s3://$S3_BUCKET/deploy/eif-$INSTANCE_ID.json"
          {"eif_key":"$EIF_KEY","commit_sha":"${{ github.sha }}","eif_sha256":"${{ needs.build-eif.outputs.eif_sha256 }}","pcr0":"${{ needs.build-eif.outputs.pcr0 }}","pcr1":"${{ needs.build-eif.outputs.pcr1 }}","pcr2":"${{ needs.build-eif.outputs.pcr2 }}"}
          EOF

      - name: Wait for pre-warm
        run: |
          S3_BUCKET="${{ steps.infra.outputs.s3_bucket }}"
          NEW_INSTANCE="${{ steps.launch.outputs.new_instance }}"
          PRE_WARM_OK=false
          for i in $(seq 1 120); do
            RESULT=$(aws s3 cp "s3://$S3_BUCKET/deploy/pre-warm-$NEW_INSTANCE.json" - 2>/dev/null || echo "")
            if [ -n "$RESULT" ]; then
              STATUS=$(echo "$RESULT" | jq -r '.status // "UNKNOWN"')
              if [ "$STATUS" = "PRE_WARM_COMPLETE" ]; then
                echo "Pre-warm complete"
                PRE_WARM_OK=true
                break
              else
                echo "FATAL: Pre-warm failed: $STATUS"; exit 1
              fi
            fi
            [ $((i % 12)) -eq 0 ] && echo "Waiting for pre-warm ($i/120)..."
            sleep 10
          done
          if [ "$PRE_WARM_OK" != "true" ]; then
            echo "FATAL: Pre-warm timed out after 20 minutes"; exit 1
          fi

      - name: Approve image for Marlin KMS
        env:
          CONTRACT_ADDRESS: ${{ secrets.MARLIN_KMS_CONTRACT_ADDRESS }}
          RPC_URL: ${{ secrets.ARBITRUM_RPC_URL }}
          PRIVATE_KEY: ${{ secrets.ARBITRUM_PRIVATE_KEY }}
        run: |
          PCR0="${{ needs.build-eif.outputs.pcr0 }}"
          PCR1="${{ needs.build-eif.outputs.pcr1 }}"
          PCR2="${{ needs.build-eif.outputs.pcr2 }}"
          COMMIT_SHA="${{ github.sha }}"
          [ -n "$CONTRACT_ADDRESS" ] || { echo "FATAL: MARLIN_KMS_CONTRACT_ADDRESS secret missing"; exit 1; }
          [ -n "$RPC_URL" ] || { echo "FATAL: ARBITRUM_RPC_URL secret missing"; exit 1; }
          [ -n "$PRIVATE_KEY" ] || { echo "FATAL: ARBITRUM_PRIVATE_KEY secret missing"; exit 1; }
          [ -n "$PCR0" ] || { echo "FATAL: Missing PCR0"; exit 1; }

          IMAGE_ID=$(python3 -c "
          import hashlib, struct
          bitflags = struct.pack('>I', (1 << 0) | (1 << 1) | (1 << 2) | (1 << 16))
          pcr0 = bytes.fromhex('${PCR0#0x}')
          pcr1 = bytes.fromhex('${PCR1#0x}')
          pcr2 = bytes.fromhex('${PCR2#0x}')
          pcr16 = b'\x00' * 48
          print('0x' + hashlib.sha256(bitflags + pcr0 + pcr1 + pcr2 + pcr16).hexdigest())
          ")
          echo "Computed image_id: $IMAGE_ID"

          VERIFY_BEFORE=$(cast call "$CONTRACT_ADDRESS" "oysterKMSVerify(bytes32)(bool)" "$IMAGE_ID" --rpc-url "$RPC_URL")
          if [ "$VERIFY_BEFORE" != "true" ]; then
            echo "Image not yet approved, registering..."
            cast send "$CONTRACT_ADDRESS" "proposeImage(bytes32,string)" "$IMAGE_ID" "$COMMIT_SHA" \
              --rpc-url "$RPC_URL" --private-key "$PRIVATE_KEY"
            cast send "$CONTRACT_ADDRESS" "activateImage()" \
              --rpc-url "$RPC_URL" --private-key "$PRIVATE_KEY"
          else
            echo "Image already approved"
          fi

          VERIFY_AFTER=$(cast call "$CONTRACT_ADDRESS" "oysterKMSVerify(bytes32)(bool)" "$IMAGE_ID" --rpc-url "$RPC_URL")
          if [ "$VERIFY_AFTER" != "true" ]; then
            echo "FATAL: Contract did not verify image_id $IMAGE_ID after approval"
            exit 1
          fi
          echo "Image approved and verified on Arbitrum"
          echo "## Marlin KMS: $IMAGE_ID approved" >> $GITHUB_STEP_SUMMARY

      - name: Write data source signal for new host
        run: |
          S3_BUCKET="${{ steps.infra.outputs.s3_bucket }}"
          MODE="${{ steps.data.outputs.mode }}"
          BACKUP_KEY="${{ steps.data.outputs.backup_key }}"

          if [ "$MODE" = "fresh" ]; then
            # Write a "success" with no backup - host will skip restore
            echo '{"status":"SUCCESS","backup_key":"","restore_type":"fresh"}' | \
              aws s3 cp - "s3://$S3_BUCKET/deploy/export-complete.json"
          elif [ "$MODE" = "seed" ]; then
            # Deliver seed to host, wait for completion, then write signal
            NEW_INSTANCE="${{ steps.launch.outputs.new_instance }}"
            SEED_CMD=$(aws ssm send-command --instance-ids "$NEW_INSTANCE" \
              --document-name "AWS-RunShellScript" \
              --parameters commands=["aws s3 cp s3://$S3_BUCKET/seed/lightfriend_db.sql /opt/lightfriend/seed/lightfriend_db.sql"] \
              --timeout-seconds 120 --query 'Command.CommandId' --output text)
            echo "Waiting for seed delivery (SSM: $SEED_CMD)..."
            for i in $(seq 1 24); do
              SSM_STATUS=$(aws ssm get-command-invocation --command-id "$SEED_CMD" \
                --instance-id "$NEW_INSTANCE" --query 'Status' --output text 2>/dev/null || echo "Pending")
              if [ "$SSM_STATUS" = "Success" ]; then echo "Seed delivered"; break; fi
              if [ "$SSM_STATUS" = "Failed" ] || [ "$SSM_STATUS" = "TimedOut" ]; then
                echo "FATAL: Seed delivery failed: $SSM_STATUS"; exit 1
              fi
              sleep 5
            done
            if [ "$SSM_STATUS" != "Success" ]; then
              echo "FATAL: Seed delivery timed out (last status: $SSM_STATUS)"; exit 1
            fi
            echo '{"status":"SUCCESS","backup_key":"","restore_type":"seed"}' | \
              aws s3 cp - "s3://$S3_BUCKET/deploy/export-complete.json"
          else
            # Write signal pointing to the backup
            echo "{\"status\":\"SUCCESS\",\"backup_key\":\"$BACKUP_KEY\",\"restore_type\":\"full\"}" | \
              aws s3 cp - "s3://$S3_BUCKET/deploy/export-complete.json"
          fi
          echo "Data source signal written for mode: $MODE"

      - name: Wait for enclave health
        id: health
        run: |
          NEW_INSTANCE="${{ steps.launch.outputs.new_instance }}"
          S3_BUCKET="${{ steps.infra.outputs.s3_bucket }}"

          for i in $(seq 1 120); do
            VERIFY=$(aws s3 cp "s3://$S3_BUCKET/deploy/verify-$NEW_INSTANCE.json" - 2>/dev/null || echo "")
            if [ -n "$VERIFY" ]; then
              echo "$VERIFY" | jq .
              STATUS=$(echo "$VERIFY" | jq -r '.status // "UNKNOWN"')
              if [ "$STATUS" = "HEALTHY" ]; then
                echo "healthy=true" >> $GITHUB_OUTPUT
                exit 0
              else
                echo "FATAL: Enclave not healthy: $STATUS"
                exit 1
              fi
            fi
            [ $((i % 6)) -eq 0 ] && echo "Waiting ($i/120)..."
            sleep 10
          done
          echo "FATAL: Health check timed out"; exit 1

      - name: Switch traffic
        if: steps.health.outputs.healthy == 'true'
        run: |
          NEW_INSTANCE="${{ steps.launch.outputs.new_instance }}"
          S3_BUCKET="${{ steps.infra.outputs.s3_bucket }}"

          OLD_INSTANCE=$(aws ssm get-parameter --name /lightfriend/instance-id \
            --query Parameter.Value --output text 2>/dev/null || echo "")
          if [ -n "$OLD_INSTANCE" ] && [ "$OLD_INSTANCE" != "$NEW_INSTANCE" ]; then
            aws ec2 terminate-instances --instance-ids "$OLD_INSTANCE" 2>/dev/null || true
            echo "Terminated old: $OLD_INSTANCE"
          fi

          aws ssm put-parameter --name /lightfriend/instance-id \
            --value "$NEW_INSTANCE" --type String --overwrite
          echo "SSM updated to $NEW_INSTANCE"

          # Cleanup
          aws s3 rm "s3://$S3_BUCKET/deploy/export-complete.json" 2>/dev/null || true
          aws s3 rm "s3://$S3_BUCKET/deploy/verify-$NEW_INSTANCE.json" 2>/dev/null || true
          aws s3 rm "s3://$S3_BUCKET/deploy/eif-$NEW_INSTANCE.json" 2>/dev/null || true
          aws s3 rm "s3://$S3_BUCKET/deploy/pre-warm-$NEW_INSTANCE.json" 2>/dev/null || true

          echo "## Recovery Complete: $NEW_INSTANCE" >> $GITHUB_STEP_SUMMARY

      - name: Rollback on failure
        if: (failure() || cancelled()) && steps.launch.outputs.new_instance != ''
        run: |
          aws ec2 terminate-instances --instance-ids "${{ steps.launch.outputs.new_instance }}" 2>/dev/null || true
          echo "Terminated failed recovery instance"
