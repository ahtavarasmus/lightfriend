name: Disaster Recovery

# Manual trigger only - Actions tab -> select workflow -> "Run workflow"
on:
  workflow_dispatch:
    inputs:
      scenario:
        description: 'Recovery type'
        required: true
        type: choice
        options:
          - 'Restore from latest S3 backup'
          - 'Restore from Cloudflare R2 backup'
          - 'Restore from seed SQL (fresh database)'
          - 'Fresh start (empty database)'
          - 'Nuclear: rebuild users from Stripe + Resend (no backup)'
      backup_key:
        description: 'S3 key to restore (optional - leave empty for latest). Format: backups/{hourly,daily,weekly,monthly}/lightfriend-full-backup-YYYYMMDDTHHMMSSZ.tar.gz.enc'
        required: false
        type: string

concurrency:
  group: disaster-recovery
  cancel-in-progress: false

env:
  REGISTRY: docker.io
  IMAGE_REPO: docker.io/ahtavarasmus/lightfriend-enclave

jobs:
  authorize:
    runs-on: ubuntu-latest
    steps:
      - name: Check actor is repo admin
        run: |
          PERMISSION=$(gh api "repos/${{ github.repository }}/collaborators/${{ github.actor }}/permission" --jq '.permission')
          if [ "$PERMISSION" != "admin" ]; then
            echo "FATAL: Only repo admins can trigger disaster recovery (actor: ${{ github.actor }}, permission: $PERMISSION)"
            exit 1
          fi
        env:
          GH_TOKEN: ${{ github.token }}

  build-and-push:
    needs: authorize
    runs-on: ubuntu-latest
    outputs:
      image_digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
      - run: sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc && sudo apt-get clean
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_REPO }}
      - uses: docker/build-push-action@v5
        id: build
        with:
          context: .
          file: enclave/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.IMAGE_REPO }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_REPO }}:buildcache,mode=max
          build-args: BUILD_MODE=production
      - id: output
        run: |
          IMAGE_REF="${{ env.IMAGE_REPO }}@${{ steps.build.outputs.digest }}"
          echo "{\"image_repo\":\"${{ env.IMAGE_REPO }}\",\"image_digest\":\"${{ steps.build.outputs.digest }}\",\"image_ref\":\"$IMAGE_REF\",\"commit_sha\":\"${{ github.sha }}\"}" > image-build.json
      - uses: actions/upload-artifact@v4
        with:
          name: image-build-${{ github.sha }}
          path: image-build.json

  build-eif:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      eif_key: ${{ steps.publish.outputs.eif_key }}
      eif_sha256: ${{ steps.publish.outputs.eif_sha256 }}
      pcr0: ${{ steps.publish.outputs.pcr0 }}
      pcr1: ${{ steps.publish.outputs.pcr1 }}
      pcr2: ${{ steps.publish.outputs.pcr2 }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: image-build-${{ github.sha }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1
      - name: Install Nitro CLI build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang llvm-dev libclang-dev pkg-config libssl-dev protobuf-compiler musl-tools
      - name: Build Nitro CLI
        run: |
          git clone --depth 1 https://github.com/aws/aws-nitro-enclaves-cli /tmp/aws-nitro-enclaves-cli
          cd /tmp/aws-nitro-enclaves-cli
          make nitro-cli
          sudo install -m 0755 "$(find build -type f -name nitro-cli | head -1)" /usr/local/bin/nitro-cli
          nitro-cli --version
      - name: Prepare Nitro CLI filesystem layout
        run: |
          sudo mkdir -p \
            /var/log/nitro_enclaves \
            /usr/share/nitro_enclaves \
            /usr/share/nitro_enclaves/blobs \
            /run/nitro_enclaves \
            /etc/nitro_enclaves
          sudo touch /var/log/nitro_enclaves/nitro_enclaves.log
          sudo chown -R "$USER":"$USER" \
            /var/log/nitro_enclaves \
            /usr/share/nitro_enclaves \
            /run/nitro_enclaves \
            /etc/nitro_enclaves
          sudo chmod 755 \
            /var/log/nitro_enclaves \
            /usr/share/nitro_enclaves \
            /usr/share/nitro_enclaves/blobs \
            /run/nitro_enclaves \
            /etc/nitro_enclaves
          sudo chmod 664 /var/log/nitro_enclaves/nitro_enclaves.log
      - name: Install Nitro CLI build blobs
        run: |
          ARCH="$(uname -m)"
          case "$ARCH" in
            x86_64|amd64) BLOB_ARCH="x86_64" ;;
            aarch64|arm64) BLOB_ARCH="aarch64" ;;
            *) echo "FATAL: unsupported architecture for Nitro blobs: $ARCH"; exit 1 ;;
          esac
          [ -d "/tmp/aws-nitro-enclaves-cli/blobs/$BLOB_ARCH" ] || { echo "FATAL: Nitro blobs missing for architecture $BLOB_ARCH"; exit 1; }
          sudo cp -R "/tmp/aws-nitro-enclaves-cli/blobs/$BLOB_ARCH/." /usr/share/nitro_enclaves/blobs/
          sudo chmod -R a+rX /usr/share/nitro_enclaves/blobs
          ls -lah /usr/share/nitro_enclaves/blobs
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build EIF
        id: eif
        run: |
          IMAGE_REF=$(jq -r '.image_ref' image-build.json)
          docker pull "$IMAGE_REF"
          nitro-cli build-enclave --docker-uri "$IMAGE_REF" --output-file lightfriend.eif 2>&1 | tee eif-output.log
          [ -f lightfriend.eif ] || { echo "FATAL: nitro-cli did not produce lightfriend.eif"; tail -50 eif-output.log; exit 1; }
          sed -n '/^{/,/^}$/p' eif-output.log > eif-measurements.json
          echo "eif_sha256=$(sha256sum lightfriend.eif | awk '{print $1}')" >> $GITHUB_OUTPUT
          PCR0=$(jq -r '.Measurements.PCR0 // empty' eif-measurements.json | tr '[:upper:]' '[:lower:]')
          PCR1=$(jq -r '.Measurements.PCR1 // empty' eif-measurements.json | tr '[:upper:]' '[:lower:]')
          PCR2=$(jq -r '.Measurements.PCR2 // empty' eif-measurements.json | tr '[:upper:]' '[:lower:]')
          [ -n "$PCR0" ] || { echo "FATAL: Missing PCR0 from nitro-cli output"; cat eif-output.log; exit 1; }
          [ -n "$PCR1" ] || { echo "FATAL: Missing PCR1"; exit 1; }
          [ -n "$PCR2" ] || { echo "FATAL: Missing PCR2"; exit 1; }
          echo "pcr0=0x$PCR0" >> $GITHUB_OUTPUT
          echo "pcr1=0x$PCR1" >> $GITHUB_OUTPUT
          echo "pcr2=0x$PCR2" >> $GITHUB_OUTPUT
      - name: Publish EIF
        id: publish
        run: |
          S3_BUCKET=$(aws ssm get-parameter --name /lightfriend/s3-bucket --query Parameter.Value --output text)
          EIF_KEY="eif/${{ github.sha }}/lightfriend.eif"
          aws s3 cp lightfriend.eif "s3://$S3_BUCKET/$EIF_KEY"
          echo "eif_key=$EIF_KEY" >> $GITHUB_OUTPUT
          echo "eif_sha256=${{ steps.eif.outputs.eif_sha256 }}" >> $GITHUB_OUTPUT
          echo "pcr0=${{ steps.eif.outputs.pcr0 }}" >> $GITHUB_OUTPUT
          echo "pcr1=${{ steps.eif.outputs.pcr1 }}" >> $GITHUB_OUTPUT
          echo "pcr2=${{ steps.eif.outputs.pcr2 }}" >> $GITHUB_OUTPUT

  # ── Recover job: exact copy of deploy job, except data source is S3 backup ──
  recover:
    needs: [build-and-push, build-eif]
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Read infrastructure parameters
        id: infra
        run: |
          S3_BUCKET=$(aws ssm get-parameter --name /lightfriend/s3-bucket --query Parameter.Value --output text)
          LAUNCH_TEMPLATE=$(aws ssm get-parameter --name /lightfriend/launch-template-id --query Parameter.Value --output text)
          SUBNET_ID=$(aws ssm get-parameter --name /lightfriend/subnet-id --query Parameter.Value --output text)
          OLD_INSTANCE=$(aws ssm get-parameter --name /lightfriend/instance-id --query Parameter.Value --output text 2>/dev/null || echo "")

          echo "s3_bucket=$S3_BUCKET" >> $GITHUB_OUTPUT
          echo "launch_template=$LAUNCH_TEMPLATE" >> $GITHUB_OUTPUT
          echo "subnet_id=$SUBNET_ID" >> $GITHUB_OUTPUT
          echo "old_instance=$OLD_INSTANCE" >> $GITHUB_OUTPUT

          echo "## Recovery Parameters" >> $GITHUB_STEP_SUMMARY
          echo "- S3 Bucket: $S3_BUCKET" >> $GITHUB_STEP_SUMMARY
          echo "- Launch Template: $LAUNCH_TEMPLATE" >> $GITHUB_STEP_SUMMARY
          echo "- Old Instance: ${OLD_INSTANCE:-none}" >> $GITHUB_STEP_SUMMARY

      - name: Check backup health
        run: |
          S3_BUCKET="${{ steps.infra.outputs.s3_bucket }}"
          HEALTH=$(aws s3 cp "s3://$S3_BUCKET/backups/backup-health.json" - 2>/dev/null || echo "")
          if [ -n "$HEALTH" ]; then
            LAST_SUCCESS=$(echo "$HEALTH" | jq -r '.last_success // "never"')
            LAST_FAILURE=$(echo "$HEALTH" | jq -r '.last_failure // "none"')
            LAST_TYPE=$(echo "$HEALTH" | jq -r '.type // "unknown"')
            LAST_KEY=$(echo "$HEALTH" | jq -r '.backup_key // "unknown"')
            echo "## Backup Health" >> $GITHUB_STEP_SUMMARY
            echo "- Last successful backup: $LAST_SUCCESS ($LAST_TYPE)" >> $GITHUB_STEP_SUMMARY
            echo "- Last verified backup key: $LAST_KEY" >> $GITHUB_STEP_SUMMARY
            if [ "$LAST_FAILURE" != "none" ] && [ "$LAST_FAILURE" != "null" ]; then
              echo "- :warning: Last failure: $LAST_FAILURE" >> $GITHUB_STEP_SUMMARY
            fi
            if [ "$LAST_SUCCESS" = "never" ]; then
              echo "WARNING: No successful scheduled backup recorded"
            fi
          else
            echo "No backup health marker found"
          fi

      - name: Cleanup stale deploys
        run: |
          S3_BUCKET="${{ steps.infra.outputs.s3_bucket }}"
          CURRENT_LIVE="${{ steps.infra.outputs.old_instance }}"

          echo "Cleaning stale deploy signals from S3..."
          aws s3 rm "s3://$S3_BUCKET/deploy/export-complete.json" 2>/dev/null || true
          aws s3 rm "s3://$S3_BUCKET/deploy/export-request.json" 2>/dev/null || true
          for prefix in eif- pre-warm- restore- verify-; do
            aws s3 ls "s3://$S3_BUCKET/deploy/${prefix}" 2>/dev/null | awk '{print $4}' | while read -r key; do
              [ -n "$key" ] && aws s3 rm "s3://$S3_BUCKET/deploy/$key" 2>/dev/null || true
            done
          done
          echo "Stale signals cleaned"

          echo "Checking for orphaned instances..."
          ALL_INSTANCES=$(aws ec2 describe-instances \
            --filters "Name=instance-state-name,Values=running" "Name=tag:Name,Values=lightfriend-*" \
            --query 'Reservations[*].Instances[*].InstanceId' --output text 2>/dev/null || echo "")
          for INST in $ALL_INSTANCES; do
            if [ "$INST" != "$CURRENT_LIVE" ]; then
              echo "Terminating orphan instance: $INST"
              aws ec2 terminate-instances --instance-ids "$INST" 2>/dev/null || true
            fi
          done

          aws s3 rm "s3://$S3_BUCKET/deploy/deploy-state.json" 2>/dev/null || true

      # ── Step 1: Launch new EC2 and pre-warm ──
      - name: Launch new EC2 instance
        id: launch
        run: |
          LAUNCH_TEMPLATE="${{ steps.infra.outputs.launch_template }}"
          SUBNET_ID="${{ steps.infra.outputs.subnet_id }}"
          S3_BUCKET="${{ steps.infra.outputs.s3_bucket }}"

          echo "Launching new EC2 from template $LAUNCH_TEMPLATE..."
          NEW_INSTANCE=$(aws ec2 run-instances \
            --launch-template LaunchTemplateId="$LAUNCH_TEMPLATE",Version='$Latest' \
            --subnet-id "$SUBNET_ID" \
            --tag-specifications "ResourceType=instance,Tags=[{Key=Name,Value=lightfriend-recovery-${{ github.run_id }}},{Key=deploy,Value=recovery-${{ github.run_id }}}]" \
            --query 'Instances[0].InstanceId' \
            --output text)

          echo "new_instance=$NEW_INSTANCE" >> $GITHUB_OUTPUT
          echo "## New Instance: $NEW_INSTANCE" >> $GITHUB_STEP_SUMMARY

          echo '{"github_run_id":"${{ github.run_id }}","old_instance":"${{ steps.infra.outputs.old_instance }}","new_instance":"'$NEW_INSTANCE'","state":"pre_warming","started_at":"'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"}' | \
            aws s3 cp - "s3://$S3_BUCKET/deploy/deploy-state.json"

          aws ec2 wait instance-running --instance-ids "$NEW_INSTANCE"
          echo "Instance running, waiting for CI-built EIF manifest"

      - name: Publish EIF manifest for new instance
        run: |
          NEW_INSTANCE="${{ steps.launch.outputs.new_instance }}"
          S3_BUCKET="${{ steps.infra.outputs.s3_bucket }}"

          cat <<EOF | aws s3 cp - "s3://$S3_BUCKET/deploy/eif-$NEW_INSTANCE.json"
          {"commit_sha":"${{ github.sha }}","eif_key":"${{ needs.build-eif.outputs.eif_key }}","eif_sha256":"${{ needs.build-eif.outputs.eif_sha256 }}","pcr0":"${{ needs.build-eif.outputs.pcr0 }}","pcr1":"${{ needs.build-eif.outputs.pcr1 }}","pcr2":"${{ needs.build-eif.outputs.pcr2 }}","workflow_run_id":"${{ github.run_id }}","published_at":"$(date -u +%Y-%m-%dT%H:%M:%SZ)"}
          EOF
          echo "EIF manifest published for $NEW_INSTANCE"

      # ── Step 2: Wait for new instance pre-warm to complete ──
      - name: Wait for pre-warm
        id: prewarm
        run: |
          NEW_INSTANCE="${{ steps.launch.outputs.new_instance }}"
          S3_BUCKET="${{ steps.infra.outputs.s3_bucket }}"

          echo "Waiting for pre-warm to complete on $NEW_INSTANCE..."
          for i in $(seq 1 240); do
            RESULT=$(aws s3 cp "s3://$S3_BUCKET/deploy/pre-warm-$NEW_INSTANCE.json" - 2>/dev/null || echo "")
            if [ -n "$RESULT" ]; then
              STATUS=$(echo "$RESULT" | jq -r '.status // "UNKNOWN"')
              echo "Pre-warm result: $STATUS"
              if [ "$STATUS" = "PRE_WARM_COMPLETE" ]; then
                echo "pre_warm_done=true" >> $GITHUB_OUTPUT
                EIF_SHA=$(echo "$RESULT" | jq -r '.eif_sha256 // empty')
                if [ "$EIF_SHA" != "${{ needs.build-eif.outputs.eif_sha256 }}" ]; then
                  echo "FATAL: pre-warm reported unexpected EIF sha256: $EIF_SHA"
                  exit 1
                fi
                echo "## Pre-warm complete" >> $GITHUB_STEP_SUMMARY
                echo "- EIF sha256: $EIF_SHA" >> $GITHUB_STEP_SUMMARY
                echo "- PCR0: ${{ needs.build-eif.outputs.pcr0 }}" >> $GITHUB_STEP_SUMMARY
                break
              else
                echo "FATAL: Pre-warm failed: $STATUS"
                echo "$RESULT" | jq .
                exit 1
              fi
            fi
            echo "Pre-warming ($i/240)..."
            sleep 10
          done

          if [ "$(echo "$RESULT" | jq -r '.status // ""')" != "PRE_WARM_COMPLETE" ]; then
            echo "FATAL: Pre-warm timed out after 40 minutes"
            exit 1
          fi

      # ── Step 3: Approve new image for Marlin KMS ──
      - name: Approve image for Marlin KMS
        id: approve
        env:
          CONTRACT_ADDRESS: ${{ secrets.MARLIN_KMS_CONTRACT_ADDRESS }}
          RPC_URL: ${{ secrets.ARBITRUM_RPC_URL }}
          PRIVATE_KEY: ${{ secrets.ARBITRUM_PRIVATE_KEY }}
        run: |
          PCR0="${{ needs.build-eif.outputs.pcr0 }}"
          PCR1="${{ needs.build-eif.outputs.pcr1 }}"
          PCR2="${{ needs.build-eif.outputs.pcr2 }}"
          COMMIT_SHA="${{ github.sha }}"
          [ -n "$CONTRACT_ADDRESS" ] || { echo "FATAL: MARLIN_KMS_CONTRACT_ADDRESS secret missing"; exit 1; }
          [ -n "$RPC_URL" ] || { echo "FATAL: ARBITRUM_RPC_URL secret missing"; exit 1; }
          [ -n "$PRIVATE_KEY" ] || { echo "FATAL: ARBITRUM_PRIVATE_KEY secret missing"; exit 1; }
          [ -n "$PCR0" ] || { echo "FATAL: Missing PCR0"; exit 1; }
          [ -n "$PCR1" ] || { echo "FATAL: Missing PCR1"; exit 1; }
          [ -n "$PCR2" ] || { echo "FATAL: Missing PCR2"; exit 1; }

          IMAGE_ID=$(python3 -c "
          import hashlib, struct
          bitflags = struct.pack('>I', (1 << 0) | (1 << 1) | (1 << 2) | (1 << 16))
          pcr0 = bytes.fromhex('${PCR0#0x}')
          pcr1 = bytes.fromhex('${PCR1#0x}')
          pcr2 = bytes.fromhex('${PCR2#0x}')
          pcr16 = b'\x00' * 48
          image_id = hashlib.sha256(bitflags + pcr0 + pcr1 + pcr2 + pcr16).hexdigest()
          print('0x' + image_id)
          ")
          echo "Computed image_id: $IMAGE_ID"
          echo "  from PCR0=$PCR0"
          echo "  from PCR1=$PCR1"
          echo "  from PCR2=$PCR2"
          echo "  PCR16=zeros"

          VERIFY_BEFORE=$(cast call "$CONTRACT_ADDRESS" "oysterKMSVerify(bytes32)(bool)" "$IMAGE_ID" --rpc-url "$RPC_URL")
          if [ "$VERIFY_BEFORE" != "true" ]; then
            echo "Image not yet approved, registering..."
            cast send "$CONTRACT_ADDRESS" "proposeImage(bytes32,string)" "$IMAGE_ID" "$COMMIT_SHA" \
              --rpc-url "$RPC_URL" \
              --private-key "$PRIVATE_KEY"

            cast send "$CONTRACT_ADDRESS" "activateImage()" \
              --rpc-url "$RPC_URL" \
              --private-key "$PRIVATE_KEY"
          else
            echo "Image already approved"
          fi

          VERIFY_AFTER=$(cast call "$CONTRACT_ADDRESS" "oysterKMSVerify(bytes32)(bool)" "$IMAGE_ID" --rpc-url "$RPC_URL")
          if [ "$VERIFY_AFTER" != "true" ]; then
            echo "FATAL: Contract did not verify image_id $IMAGE_ID after approval"
            exit 1
          fi
          echo "Image approved and verified on Arbitrum"

          echo "image_id=$IMAGE_ID" >> $GITHUB_OUTPUT
          echo "## Marlin KMS Approval" >> $GITHUB_STEP_SUMMARY
          echo "- Contract: $CONTRACT_ADDRESS" >> $GITHUB_STEP_SUMMARY
          echo "- Image ID: $IMAGE_ID" >> $GITHUB_STEP_SUMMARY
          echo "- PCR0: $PCR0" >> $GITHUB_STEP_SUMMARY
          echo "- PCR1: $PCR1" >> $GITHUB_STEP_SUMMARY
          echo "- PCR2: $PCR2" >> $GITHUB_STEP_SUMMARY

      # ── Step 4: Get data source (DR: from S3 backup instead of live export) ──
      - name: Get data source
        id: backup
        env:
          AWS_DEFAULT_REGION: us-east-1
        run: |
          S3_BUCKET="${{ steps.infra.outputs.s3_bucket }}"
          SCENARIO="${{ inputs.scenario }}"
          SPECIFIC_KEY="${{ inputs.backup_key }}"

          echo "## Recovery: $SCENARIO" >> $GITHUB_STEP_SUMMARY

          if [ "$SCENARIO" = "Fresh start (empty database)" ]; then
            echo '{"status":"SUCCESS","backup_key":"","restore_type":"fresh"}' | \
              aws s3 cp - "s3://$S3_BUCKET/deploy/export-complete.json"
            echo "mode=fresh" >> $GITHUB_OUTPUT
            echo "No backup - fresh start"
            exit 0
          fi

          if echo "$SCENARIO" | grep -q "Nuclear"; then
            echo '{"status":"SUCCESS","backup_key":"","restore_type":"fresh"}' | \
              aws s3 cp - "s3://$S3_BUCKET/deploy/export-complete.json"
            echo "mode=nuclear" >> $GITHUB_OUTPUT
            echo "Nuclear recovery - will rebuild users from Stripe + Resend after boot"
            exit 0
          fi

          if [ "$SCENARIO" = "Restore from seed SQL (fresh database)" ]; then
            aws s3api head-object --bucket "$S3_BUCKET" --key "seed/lightfriend_db.sql" || {
              echo "FATAL: No seed/lightfriend_db.sql in S3. Upload it first."
              exit 1
            }
            echo '{"status":"SUCCESS","backup_key":"","restore_type":"seed"}' | \
              aws s3 cp - "s3://$S3_BUCKET/deploy/export-complete.json"
            echo "mode=seed" >> $GITHUB_OUTPUT
            echo "Seed SQL found"
            exit 0
          fi

          # Find backup (S3 or R2)
          BACKUP_KEY=""
          if [ -n "$SPECIFIC_KEY" ]; then
            BACKUP_KEY="$SPECIFIC_KEY"
          elif echo "$SCENARIO" | grep -q "R2"; then
            ENV_FILE=$(aws s3 cp "s3://$S3_BUCKET/config/.env" - 2>/dev/null)
            R2_BUCKET=$(echo "$ENV_FILE" | grep R2_BACKUP_BUCKET | cut -d= -f2)
            R2_ENDPOINT=$(echo "$ENV_FILE" | grep R2_ENDPOINT_URL | cut -d= -f2)
            R2_ACCESS=$(echo "$ENV_FILE" | grep R2_ACCESS_KEY_ID | cut -d= -f2)
            R2_SECRET=$(echo "$ENV_FILE" | grep R2_SECRET_ACCESS_KEY | cut -d= -f2)

            R2_KEY=$(AWS_ACCESS_KEY_ID="$R2_ACCESS" AWS_SECRET_ACCESS_KEY="$R2_SECRET" AWS_SESSION_TOKEN="" \
              aws s3 ls "s3://$R2_BUCKET/" --recursive --endpoint-url "$R2_ENDPOINT" 2>&1 | \
              grep '\.tar\.gz\.enc$' | sort -k1,2 | tail -1 | awk '{print $4}')
            [ -n "$R2_KEY" ] || { echo "FATAL: No backups in R2"; exit 1; }

            TMP=$(mktemp /tmp/r2-backup.XXXXXX.enc)
            AWS_ACCESS_KEY_ID="$R2_ACCESS" AWS_SECRET_ACCESS_KEY="$R2_SECRET" AWS_SESSION_TOKEN="" \
              aws s3 cp "s3://$R2_BUCKET/$R2_KEY" "$TMP" --endpoint-url "$R2_ENDPOINT"
            BACKUP_KEY="backups/recovery/$(basename $R2_KEY)"
            aws s3 cp "$TMP" "s3://$S3_BUCKET/$BACKUP_KEY"
            rm -f "$TMP"
          else
            for PREFIX in "backups/deploy/" "backups/hourly/" "backups/daily/"; do
              BACKUP_KEY=$(aws s3 ls "s3://$S3_BUCKET/$PREFIX" --recursive 2>/dev/null | \
                grep '\.tar\.gz\.enc$' | sort -k1,2 | tail -1 | awk '{print $4}')
              [ -n "$BACKUP_KEY" ] && break
            done
            [ -n "$BACKUP_KEY" ] || { echo "FATAL: No backups in S3"; exit 1; }
          fi

          # Validate backup
          BACKUP_SIZE=$(aws s3api head-object --bucket "$S3_BUCKET" --key "$BACKUP_KEY" \
            --query 'ContentLength' --output text 2>/dev/null || echo "0")
          if [ "$BACKUP_SIZE" = "0" ] || [ -z "$BACKUP_SIZE" ]; then
            echo "FATAL: Backup file is empty or missing: $BACKUP_KEY"
            exit 1
          fi
          if [ "$BACKUP_SIZE" -lt 1048576 ]; then
            echo "::warning::Backup is suspiciously small ($BACKUP_SIZE bytes)"
          fi

          LAST_MOD=$(aws s3api head-object --bucket "$S3_BUCKET" --key "$BACKUP_KEY" \
            --query 'LastModified' --output text 2>/dev/null || echo "")
          if [ -n "$LAST_MOD" ]; then
            BACKUP_EPOCH=$(date -d "$LAST_MOD" +%s 2>/dev/null || echo "0")
            NOW_EPOCH=$(date +%s)
            if [ "$BACKUP_EPOCH" -gt 0 ]; then
              HOURS_OLD=$(( (NOW_EPOCH - BACKUP_EPOCH) / 3600 ))
              echo "Backup age: ${HOURS_OLD}h"
              if [ "$HOURS_OLD" -gt 168 ]; then
                echo "::warning::Backup is ${HOURS_OLD}h old (>7 days). Significant data loss likely."
              elif [ "$HOURS_OLD" -gt 24 ]; then
                echo "::warning::Backup is ${HOURS_OLD}h old (>24h). Some data loss possible."
              fi
              echo "Backup age: ${HOURS_OLD}h" >> $GITHUB_STEP_SUMMARY
            fi
          fi

          # Write export-complete.json so host picks up the backup
          echo "{\"status\":\"SUCCESS\",\"backup_key\":\"$BACKUP_KEY\",\"restore_type\":\"full\"}" | \
            aws s3 cp - "s3://$S3_BUCKET/deploy/export-complete.json"

          echo "mode=backup" >> $GITHUB_OUTPUT
          echo "backup_key=$BACKUP_KEY" >> $GITHUB_OUTPUT
          echo "backup_size=$BACKUP_SIZE" >> $GITHUB_OUTPUT
          echo "## Backup: $BACKUP_KEY ($BACKUP_SIZE bytes)" >> $GITHUB_STEP_SUMMARY

      # ── Step 5: Wait for new enclave to restore, verify, become healthy ──
      - name: Wait for enclave health
        id: health
        run: |
          NEW_INSTANCE="${{ steps.launch.outputs.new_instance }}"
          OLD_INSTANCE="${{ steps.infra.outputs.old_instance }}"
          S3_BUCKET="${{ steps.infra.outputs.s3_bucket }}"

          echo "Waiting for enclave health on $NEW_INSTANCE..."
          for i in $(seq 1 120); do
            VERIFY=$(aws s3 cp "s3://$S3_BUCKET/deploy/verify-$NEW_INSTANCE.json" - 2>/dev/null || echo "")
            if [ -n "$VERIFY" ]; then
              echo "$VERIFY" | jq .
              STATUS=$(echo "$VERIFY" | jq -r '.status // "UNKNOWN"')
              RESTORE_TYPE=$(echo "$VERIFY" | jq -r '.restore_type // "unknown"')
              USER_COUNT=$(echo "$VERIFY" | jq -r '.user_count // 0')

              echo "## Health: $STATUS | restore: $RESTORE_TYPE | users: $USER_COUNT" >> $GITHUB_STEP_SUMMARY

              if [ "$STATUS" != "HEALTHY" ]; then
                echo "FATAL: Enclave not healthy: $STATUS"
                echo "Details: $(echo "$VERIFY" | jq -r '.details // .failed_checks // "none"')"
                echo "=== Host debug logs ==="
                aws ssm send-command --instance-ids "$NEW_INSTANCE" \
                  --document-name "AWS-RunShellScript" \
                  --parameters '{"commands":["tail -100 /tmp/launch.log 2>/dev/null; echo === RESTORE ===; tail -100 /tmp/restore-enclave-debug.log 2>/dev/null"]}' \
                  --timeout-seconds 30 --query 'Command.CommandId' --output text 2>/dev/null || true
                sleep 10
                exit 1
              fi
              if [ -n "$OLD_INSTANCE" ]; then
                echo "Data migration verified: $USER_COUNT users"
              fi
              echo "healthy=true" >> $GITHUB_OUTPUT
              exit 0
            fi

            # Every 30s, check host progress via SSM for visibility
            if [ $((i % 3)) -eq 0 ]; then
              PROGRESS=$(aws ssm send-command --instance-ids "$NEW_INSTANCE" \
                --document-name "AWS-RunShellScript" \
                --parameters '{"commands":["echo PHASE=$(cat /tmp/deploy-phase 2>/dev/null || echo unknown); echo ENCLAVE=$(nitro-cli describe-enclaves 2>/dev/null | jq -r \".[0].State // \\\"none\\\"\")"]}' \
                --timeout-seconds 10 --query 'Command.CommandId' --output text 2>/dev/null || echo "")
              if [ -n "$PROGRESS" ]; then
                sleep 8
                PROG_OUT=$(aws ssm get-command-invocation --command-id "$PROGRESS" \
                  --instance-id "$NEW_INSTANCE" --query 'StandardOutputContent' --output text 2>/dev/null || echo "ssm-pending")
                echo "Waiting ($i/120) - host: $PROG_OUT"
              else
                echo "Waiting ($i/120)..."
              fi
            else
              echo "Waiting ($i/120)..."
            fi
            sleep 10
          done

          # Timeout - dump host logs for diagnosis
          echo "FATAL: Health check timed out after 20 minutes"
          echo "=== Dumping host logs ==="
          CMD_ID=$(aws ssm send-command --instance-ids "$NEW_INSTANCE" \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":["echo === USER_DATA ===; tail -50 /var/log/cloud-init-output.log 2>/dev/null; echo === LAUNCH ===; tail -50 /tmp/launch.log 2>/dev/null; echo === RESTORE ===; tail -50 /tmp/restore-enclave-debug.log 2>/dev/null; echo === ENCLAVE ===; nitro-cli describe-enclaves 2>/dev/null; echo === SEED DIR ===; ls -la /opt/lightfriend/seed/ 2>/dev/null"]}' \
            --timeout-seconds 30 --query 'Command.CommandId' --output text 2>/dev/null || echo "")
          if [ -n "$CMD_ID" ]; then
            sleep 15
            aws ssm get-command-invocation --command-id "$CMD_ID" \
              --instance-id "$NEW_INSTANCE" --query 'StandardOutputContent' --output text 2>/dev/null || echo "(SSM failed)"
          fi
          exit 1

      - name: Rebuild users from Stripe + Resend
        if: steps.health.outputs.healthy == 'true' && steps.backup.outputs.mode == 'nuclear'
        run: |
          S3_BUCKET="${{ steps.infra.outputs.s3_bucket }}"
          NEW_INSTANCE="${{ steps.launch.outputs.new_instance }}"

          MAINTENANCE_SECRET=$(aws s3 cp "s3://$S3_BUCKET/config/.env" - 2>/dev/null | grep MAINTENANCE_SECRET | cut -d= -f2-)
          if [ -z "$MAINTENANCE_SECRET" ]; then
            echo "FATAL: MAINTENANCE_SECRET not found in S3 config/.env"
            exit 1
          fi

          DOMAIN=$(aws s3 cp "s3://$S3_BUCKET/config/.env" - 2>/dev/null | grep "^DOMAIN=" | cut -d= -f2-)
          DOMAIN="${DOMAIN:-lightfriend.ai}"

          echo "Triggering nuclear recovery on $DOMAIN..."
          sleep 10

          RECOVERY_CMD=$(aws ssm send-command --instance-ids "$NEW_INSTANCE" \
            --document-name "AWS-RunShellScript" \
            --parameters commands=["curl -sf --max-time 300 -X POST -H 'X-Maintenance-Secret: $MAINTENANCE_SECRET' https://$DOMAIN/api/internal/recover-users"] \
            --timeout-seconds 360 --query 'Command.CommandId' --output text)

          echo "Waiting for user recovery (SSM: $RECOVERY_CMD)..."
          for i in $(seq 1 72); do
            SSM_STATUS=$(aws ssm get-command-invocation --command-id "$RECOVERY_CMD" \
              --instance-id "$NEW_INSTANCE" --query 'Status' --output text 2>/dev/null || echo "Pending")
            if [ "$SSM_STATUS" = "Success" ]; then
              RESULT=$(aws ssm get-command-invocation --command-id "$RECOVERY_CMD" \
                --instance-id "$NEW_INSTANCE" --query 'StandardOutputContent' --output text 2>/dev/null || echo "")
              echo "Nuclear recovery complete:"
              echo "$RESULT"
              echo "## Nuclear Recovery Result" >> $GITHUB_STEP_SUMMARY
              echo '```json' >> $GITHUB_STEP_SUMMARY
              echo "$RESULT" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              break
            fi
            if [ "$SSM_STATUS" = "Failed" ] || [ "$SSM_STATUS" = "TimedOut" ]; then
              ERROR=$(aws ssm get-command-invocation --command-id "$RECOVERY_CMD" \
                --instance-id "$NEW_INSTANCE" --query 'StandardErrorContent' --output text 2>/dev/null || echo "unknown")
              echo "FATAL: Nuclear recovery failed: $SSM_STATUS"
              echo "Error: $ERROR"
              exit 1
            fi
            [ $((i % 6)) -eq 0 ] && echo "  Waiting... $((i * 5))s"
            sleep 5
          done
          if [ "$SSM_STATUS" != "Success" ]; then
            echo "FATAL: Nuclear recovery timed out"
            exit 1
          fi

      # ── Step 8: Switch traffic to new instance ──
      - name: Switch to new instance
        if: steps.health.outputs.healthy == 'true'
        env:
          AWS_DEFAULT_REGION: us-east-1
        run: |
          NEW_INSTANCE="${{ steps.launch.outputs.new_instance }}"
          OLD_INSTANCE="${{ steps.infra.outputs.old_instance }}"
          S3_BUCKET="${{ steps.infra.outputs.s3_bucket }}"

          # Enable maintenance mode on old instance to stop cloudflared and block writes
          if [ -n "$OLD_INSTANCE" ] && [ "$OLD_INSTANCE" != "$NEW_INSTANCE" ]; then
            echo "Enabling maintenance mode on old instance to stop cloudflared..."
            MAINT_CMD=$(aws ssm send-command \
              --instance-ids "$OLD_INSTANCE" \
              --document-name "AWS-RunShellScript" \
              --parameters '{"commands":["/opt/lightfriend/trigger-maintenance.sh enable"]}' \
              --timeout-seconds 30 \
              --query "Command.CommandId" --output text 2>/dev/null || echo "")
            if [ -n "$MAINT_CMD" ]; then
              for i in $(seq 1 6); do
                MAINT_STATUS=$(aws ssm get-command-invocation --command-id "$MAINT_CMD" --instance-id "$OLD_INSTANCE" \
                  --query "Status" --output text 2>/dev/null || echo "Pending")
                case "$MAINT_STATUS" in
                  Success) echo "Old instance maintenance mode enabled"; break ;;
                  Failed|TimedOut|Cancelled) echo "WARNING: Maintenance enable $MAINT_STATUS (non-fatal, terminating anyway)"; break ;;
                esac
                sleep 5
              done
            fi
          fi

          aws ssm put-parameter --name /lightfriend/instance-id \
            --value "$NEW_INSTANCE" --type String --overwrite
          echo "SSM updated to $NEW_INSTANCE"

          # Brief grace period then terminate old
          sleep 15
          if [ -n "$OLD_INSTANCE" ] && [ "$OLD_INSTANCE" != "$NEW_INSTANCE" ]; then
            aws ec2 terminate-instances --instance-ids "$OLD_INSTANCE" 2>/dev/null || echo "WARNING: Could not terminate old instance $OLD_INSTANCE (may already be gone)"
            echo "Old instance $OLD_INSTANCE terminated"
          fi

          echo '{"github_run_id":"${{ github.run_id }}","old_instance":"'$OLD_INSTANCE'","new_instance":"'$NEW_INSTANCE'","state":"complete","completed_at":"'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"}' | \
            aws s3 cp - "s3://$S3_BUCKET/deploy/deploy-state.json"

          cat <<EOF | aws s3 cp - "s3://$S3_BUCKET/deploy/logs/deploy-${{ github.run_id }}.json"
          {"deploy_id":"${{ github.run_id }}","commit_sha":"${{ github.sha }}","completed_at":"$(date -u +%Y-%m-%dT%H:%M:%SZ)","outcome":"DR_SUCCESS","old_instance":"$OLD_INSTANCE","new_instance":"$NEW_INSTANCE","eif_key":"${{ needs.build-eif.outputs.eif_key }}","eif_sha256":"${{ needs.build-eif.outputs.eif_sha256 }}","pcr0":"${{ needs.build-eif.outputs.pcr0 }}","pcr1":"${{ needs.build-eif.outputs.pcr1 }}","pcr2":"${{ needs.build-eif.outputs.pcr2 }}","scenario":"${{ inputs.scenario }}"}
          EOF

          aws s3 rm "s3://$S3_BUCKET/deploy/verify-$NEW_INSTANCE.json" 2>/dev/null || true
          aws s3 rm "s3://$S3_BUCKET/deploy/pre-warm-$NEW_INSTANCE.json" 2>/dev/null || true
          aws s3 rm "s3://$S3_BUCKET/deploy/eif-$NEW_INSTANCE.json" 2>/dev/null || true
          aws s3 rm "s3://$S3_BUCKET/deploy/restore-$NEW_INSTANCE.json" 2>/dev/null || true

          echo "## Recovery Complete" >> $GITHUB_STEP_SUMMARY

      # ── Rollback: terminate new instance, old stays live ──
      - name: Rollback on failure
        if: (failure() || cancelled()) && steps.launch.outputs.new_instance != ''
        env:
          AWS_DEFAULT_REGION: us-east-1
          CONTRACT_ADDRESS: ${{ secrets.MARLIN_KMS_CONTRACT_ADDRESS }}
          RPC_URL: ${{ secrets.ARBITRUM_RPC_URL }}
          PRIVATE_KEY: ${{ secrets.ARBITRUM_PRIVATE_KEY }}
        run: |
          NEW_INSTANCE="${{ steps.launch.outputs.new_instance }}"
          OLD_INSTANCE="${{ steps.infra.outputs.old_instance }}"
          S3_BUCKET="${{ steps.infra.outputs.s3_bucket }}"
          PCR0="${{ needs.build-eif.outputs.pcr0 }}"
          PCR1="${{ needs.build-eif.outputs.pcr1 }}"
          PCR2="${{ needs.build-eif.outputs.pcr2 }}"

          echo "ROLLING BACK: terminating new instance $NEW_INSTANCE"
          echo "Old instance $OLD_INSTANCE was never put in maintenance mode - still serving traffic"

          # Restore SSM to old instance
          if [ -n "$OLD_INSTANCE" ]; then
            aws ssm put-parameter --name /lightfriend/instance-id \
              --value "$OLD_INSTANCE" --type String --overwrite 2>/dev/null || true
          fi

          aws ec2 terminate-instances --instance-ids "$NEW_INSTANCE" 2>/dev/null || true

          if [ -n "$CONTRACT_ADDRESS" ] && [ -n "$RPC_URL" ] && [ -n "$PRIVATE_KEY" ] && [ -n "$PCR0" ]; then
            IMAGE_ID=$(python3 -c "
          import hashlib, struct
          bitflags = struct.pack('>I', (1 << 0) | (1 << 1) | (1 << 2) | (1 << 16))
          pcr0 = bytes.fromhex('${PCR0#0x}')
          pcr1 = bytes.fromhex('${PCR1#0x}')
          pcr2 = bytes.fromhex('${PCR2#0x}')
          pcr16 = b'\x00' * 48
          image_id = hashlib.sha256(bitflags + pcr0 + pcr1 + pcr2 + pcr16).hexdigest()
          print('0x' + image_id)
          ")
            echo "Revoking failed image approval for image_id $IMAGE_ID"
            cast send "$CONTRACT_ADDRESS" "revokeImage(bytes32)" "$IMAGE_ID" \
              --rpc-url "$RPC_URL" \
              --private-key "$PRIVATE_KEY" 2>/dev/null || true
          fi

          cat <<EOF | aws s3 cp - "s3://$S3_BUCKET/deploy/logs/deploy-${{ github.run_id }}.json"
          {"deploy_id":"${{ github.run_id }}","commit_sha":"${{ github.sha }}","completed_at":"$(date -u +%Y-%m-%dT%H:%M:%SZ)","outcome":"DR_ROLLBACK","old_instance":"$OLD_INSTANCE","new_instance":"$NEW_INSTANCE","eif_key":"${{ needs.build-eif.outputs.eif_key }}","eif_sha256":"${{ needs.build-eif.outputs.eif_sha256 }}","pcr0":"${{ needs.build-eif.outputs.pcr0 }}","pcr1":"${{ needs.build-eif.outputs.pcr1 }}","pcr2":"${{ needs.build-eif.outputs.pcr2 }}"}
          EOF

          # Clean up ALL S3 deploy signals
          aws s3 rm "s3://$S3_BUCKET/deploy/verify-$NEW_INSTANCE.json" 2>/dev/null || true
          aws s3 rm "s3://$S3_BUCKET/deploy/pre-warm-$NEW_INSTANCE.json" 2>/dev/null || true
          aws s3 rm "s3://$S3_BUCKET/deploy/eif-$NEW_INSTANCE.json" 2>/dev/null || true
          aws s3 rm "s3://$S3_BUCKET/deploy/restore-$NEW_INSTANCE.json" 2>/dev/null || true
          aws s3 rm "s3://$S3_BUCKET/deploy/export-complete.json" 2>/dev/null || true
          aws s3 rm "s3://$S3_BUCKET/deploy/export-request.json" 2>/dev/null || true

          echo "## ROLLBACK - old instance $OLD_INSTANCE restored" >> $GITHUB_STEP_SUMMARY
