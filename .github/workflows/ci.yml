name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  # Fast check - no compilation, runs in seconds
  format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        working-directory: backend
        run: cargo fmt --check

  # Single backend job: clippy + tests + migration test
  # Avoids compiling the backend 3 times in separate jobs
  backend:
    name: Backend (clippy + tests)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: lightfriend
          POSTGRES_PASSWORD: test
          POSTGRES_DB: lightfriend_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo apt-get clean

      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
          cache-on-failure: true

      - name: Clippy
        working-directory: backend
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Tests
        working-directory: backend
        env:
          TEST_PG_DATABASE_URL: postgres://lightfriend:test@localhost:5432/lightfriend_test
        run: cargo test --workspace

      - name: Migration tests
        working-directory: backend
        env:
          TEST_PG_DATABASE_URL: postgres://lightfriend:test@localhost:5432/lightfriend_test
        run: cargo test --test migration_test

      - name: Startup smoke test
        working-directory: backend
        env:
          PG_DATABASE_URL: postgres://lightfriend:test@localhost:5432/lightfriend_test
          ENCRYPTION_KEY: ci-test-key-not-real-000000000000
          JWT_SECRET: ci-test-jwt-secret
          PORT: 3199
        run: |
          # Build the binary (should be cached from test compilation)
          cargo build --bin backend --quiet

          # Start the backend and check if it boots without panicking
          timeout 15 ./target/debug/backend &
          PID=$!
          sleep 5

          # Check if process is still alive (panics would have killed it)
          if ! kill -0 $PID 2>/dev/null; then
            echo "FATAL: Backend crashed on startup"
            wait $PID 2>/dev/null || true
            exit 1
          fi

          # Try the health endpoint
          if curl -sf --max-time 5 http://localhost:3199/api/health >/dev/null 2>&1; then
            echo "Startup smoke test passed: health check OK"
          else
            echo "WARNING: Health endpoint not reachable (may need more env vars) but process is alive - no panic"
          fi

          kill $PID 2>/dev/null || true
          wait $PID 2>/dev/null || true

  # Frontend WASM check - runs in parallel with backend
  wasm-check:
    name: Frontend WASM Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: frontend
          cache-on-failure: true

      - name: Check WASM compilation
        working-directory: frontend
        run: cargo check --target wasm32-unknown-unknown

  enclave-scripts:
    name: Enclave Script Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Validate enclave scripts
        run: |
          echo "Checking enclave shell scripts for syntax errors..."
          shellcheck -s bash enclave/entrypoint.sh
          shellcheck -s bash enclave/export.sh
          shellcheck -s bash enclave/verify.sh
          shellcheck -s bash enclave/enter-maintenance.sh

      - name: Validate Dockerfile builds
        run: |
          echo "Checking Dockerfile syntax..."
          docker build --check -f enclave/Dockerfile . 2>/dev/null || \
            docker build --dry-run -f enclave/Dockerfile . 2>/dev/null || \
            echo "Docker syntax check not available - skipping (build job will catch errors)"
