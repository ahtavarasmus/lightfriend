name: notify-server deploy

# Builds notify-server on ubuntu-latest (glibc-compatible with Ubuntu 24.04
# on the Hetzner VPS) and ships the binary to the host over SSH. The user
# manages the .env file on the host directly — secrets never round-trip
# through GitHub.
#
# Required secrets:
#   RETARD_SSH_HOST   - hostname or IP of the Hetzner box
#   RETARD_SSH_USER   - SSH user (typically "rasmus")
#   RETARD_SSH_KEY    - private SSH key with access to the box
#
# Optional:
#   RETARD_SSH_PORT   - defaults to 22

on:
  push:
    branches: [master]
    paths:
      - 'notify-server/**'
      - '.github/workflows/notify-server-deploy.yml'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: notify-server-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            notify-server/target
          key: notify-server-${{ runner.os }}-${{ hashFiles('notify-server/Cargo.lock') }}
          restore-keys: |
            notify-server-${{ runner.os }}-

      - name: Build release binary
        working-directory: notify-server
        run: cargo build --release --locked

      - name: Set up SSH
        env:
          SSH_KEY: ${{ secrets.RETARD_SSH_KEY }}
          SSH_HOST: ${{ secrets.RETARD_SSH_HOST }}
          SSH_PORT: ${{ secrets.RETARD_SSH_PORT }}
        run: |
          if [ -z "${SSH_KEY:-}" ] || [ -z "${SSH_HOST:-}" ]; then
            echo "Missing RETARD_SSH_KEY or RETARD_SSH_HOST in repo secrets"
            exit 1
          fi
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          PORT="${SSH_PORT:-22}"
          ssh-keyscan -p "$PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Ship binary and restart
        env:
          SSH_HOST: ${{ secrets.RETARD_SSH_HOST }}
          SSH_USER: ${{ secrets.RETARD_SSH_USER }}
          SSH_PORT: ${{ secrets.RETARD_SSH_PORT }}
        run: |
          set -euo pipefail
          PORT="${SSH_PORT:-22}"
          REMOTE="$SSH_USER@$SSH_HOST"

          # Stage atomic swap: scp to .new, mv in-place, restart
          ssh -i ~/.ssh/id_deploy -p "$PORT" "$REMOTE" 'mkdir -p ~/notify-server'
          scp -i ~/.ssh/id_deploy -P "$PORT" \
            notify-server/target/release/notify-server \
            "$REMOTE":~/notify-server/notify-server.new

          ssh -i ~/.ssh/id_deploy -p "$PORT" "$REMOTE" bash -se <<'EOF'
            set -euo pipefail
            cd ~/notify-server
            chmod +x notify-server.new
            mv notify-server.new notify-server

            # Restart only if user-level systemd unit exists and env file is populated.
            # First-time deploys land the binary but do not start the service until the
            # operator has filled in .env and run the host setup script.
            if [ -f ~/.config/systemd/user/notify-server.service ] && [ -s ~/notify-server/.env ]; then
              systemctl --user daemon-reload
              systemctl --user restart notify-server
              echo "notify-server restarted"
              sleep 2
              systemctl --user status notify-server --no-pager | head -20 || true
            else
              echo "Binary deployed but service not started."
              echo "Run notify-server/scripts/host-setup.sh on the box once to install"
              echo "the systemd unit, then populate ~/notify-server/.env and start the service."
            fi
EOF
