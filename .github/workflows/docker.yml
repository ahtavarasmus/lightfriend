name: Docker Build & Deploy

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

env:
  REGISTRY: docker.io

jobs:
  check-secrets:
    runs-on: ubuntu-latest
    outputs:
      has-secrets: ${{ steps.check.outputs.has-secrets }}
    steps:
      - id: check
        env:
          HAS_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          HAS_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -n "$HAS_USERNAME" ] && [ -n "$HAS_TOKEN" ]; then
            echo "has-secrets=true" >> $GITHUB_OUTPUT
          else
            echo "has-secrets=false" >> $GITHUB_OUTPUT
          fi

  build-and-push:
    needs: check-secrets
    if: needs.check-secrets.outputs.has-secrets == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    concurrency:
      group: docker-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo apt-get clean

      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/ahtavarasmus/lightfriend-enclave
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: enclave/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1

  deploy:
    needs: build-and-push
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read

    # NEVER cancel a running deploy - it must complete or roll back
    concurrency:
      group: deploy-production
      cancel-in-progress: false

    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: Read infrastructure parameters
        id: infra
        run: |
          S3_BUCKET=$(aws ssm get-parameter --name /lightfriend/s3-bucket --query Parameter.Value --output text)
          LAUNCH_TEMPLATE=$(aws ssm get-parameter --name /lightfriend/launch-template-id --query Parameter.Value --output text)
          SUBNET_ID=$(aws ssm get-parameter --name /lightfriend/subnet-id --query Parameter.Value --output text)
          OLD_INSTANCE=$(aws ssm get-parameter --name /lightfriend/instance-id --query Parameter.Value --output text 2>/dev/null || echo "")

          echo "s3_bucket=$S3_BUCKET" >> $GITHUB_OUTPUT
          echo "launch_template=$LAUNCH_TEMPLATE" >> $GITHUB_OUTPUT
          echo "subnet_id=$SUBNET_ID" >> $GITHUB_OUTPUT
          echo "old_instance=$OLD_INSTANCE" >> $GITHUB_OUTPUT

          echo "## Deploy Parameters" >> $GITHUB_STEP_SUMMARY
          echo "- S3 Bucket: $S3_BUCKET" >> $GITHUB_STEP_SUMMARY
          echo "- Launch Template: $LAUNCH_TEMPLATE" >> $GITHUB_STEP_SUMMARY
          echo "- Old Instance: ${OLD_INSTANCE:-none (first deploy)}" >> $GITHUB_STEP_SUMMARY

      # ── Safety: clean up orphaned instances from crashed prior deploys ──
      - name: Cleanup stale deploys
        run: |
          S3_BUCKET="${{ steps.infra.outputs.s3_bucket }}"
          CURRENT_LIVE="${{ steps.infra.outputs.old_instance }}"
          STALE_STATE=$(aws s3 cp "s3://$S3_BUCKET/deploy/deploy-state.json" - 2>/dev/null || echo "")
          if [ -n "$STALE_STATE" ]; then
            STALE_STATUS=$(echo "$STALE_STATE" | jq -r '.state // "unknown"')
            ORPHAN_INSTANCE=$(echo "$STALE_STATE" | jq -r '.new_instance // ""')
            STALE_RUN=$(echo "$STALE_STATE" | jq -r '.github_run_id // "unknown"')

            if [ "$STALE_STATUS" != "complete" ] && [ -n "$ORPHAN_INSTANCE" ]; then
              # CRITICAL: never terminate the instance SSM says is live
              if [ "$ORPHAN_INSTANCE" = "$CURRENT_LIVE" ]; then
                echo "WARNING: Orphan instance $ORPHAN_INSTANCE is the current live instance - NOT terminating"
              else
                echo "WARNING: Found orphaned deploy from run $STALE_RUN (state: $STALE_STATUS)"
                echo "Terminating orphan instance $ORPHAN_INSTANCE..."
                aws ec2 terminate-instances --instance-ids "$ORPHAN_INSTANCE" 2>/dev/null || true
                echo "Orphan cleaned up"
              fi
            fi
            aws s3 rm "s3://$S3_BUCKET/deploy/deploy-state.json" 2>/dev/null || true
          fi

      # ── Step 1: Launch new EC2 and pre-warm ──
      - name: Launch new EC2 instance
        id: launch
        run: |
          LAUNCH_TEMPLATE="${{ steps.infra.outputs.launch_template }}"
          SUBNET_ID="${{ steps.infra.outputs.subnet_id }}"
          S3_BUCKET="${{ steps.infra.outputs.s3_bucket }}"

          echo "Launching new EC2 from template $LAUNCH_TEMPLATE..."
          NEW_INSTANCE=$(aws ec2 run-instances \
            --launch-template LaunchTemplateId="$LAUNCH_TEMPLATE",Version='$Latest' \
            --subnet-id "$SUBNET_ID" \
            --query 'Instances[0].InstanceId' \
            --output text)

          echo "new_instance=$NEW_INSTANCE" >> $GITHUB_OUTPUT
          echo "## New Instance: $NEW_INSTANCE" >> $GITHUB_STEP_SUMMARY

          echo '{"github_run_id":"${{ github.run_id }}","old_instance":"${{ steps.infra.outputs.old_instance }}","new_instance":"'$NEW_INSTANCE'","state":"pre_warming","started_at":"'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"}' | \
            aws s3 cp - "s3://$S3_BUCKET/deploy/deploy-state.json"

          aws ec2 wait instance-running --instance-ids "$NEW_INSTANCE"
          echo "Instance running, pre-warming started (docker pull + EIF build)"

      # ── Step 2: Wait for new instance pre-warm to complete ──
      - name: Wait for pre-warm
        id: prewarm
        run: |
          NEW_INSTANCE="${{ steps.launch.outputs.new_instance }}"
          S3_BUCKET="${{ steps.infra.outputs.s3_bucket }}"

          echo "Waiting for pre-warm to complete on $NEW_INSTANCE..."
          for i in $(seq 1 120); do
            RESULT=$(aws s3 cp "s3://$S3_BUCKET/deploy/pre-warm-$NEW_INSTANCE.json" - 2>/dev/null || echo "")
            if [ -n "$RESULT" ]; then
              STATUS=$(echo "$RESULT" | jq -r '.status // "UNKNOWN"')
              echo "Pre-warm result: $STATUS"
              if [ "$STATUS" = "PRE_WARM_COMPLETE" ]; then
                echo "pre_warm_done=true" >> $GITHUB_OUTPUT
                echo "## Pre-warm complete" >> $GITHUB_STEP_SUMMARY
                break
              else
                echo "FATAL: Pre-warm failed: $STATUS"
                echo "$RESULT" | jq .
                exit 1
              fi
            fi
            echo "Pre-warming ($i/120)..."
            sleep 10
          done

          if [ "$(echo "$RESULT" | jq -r '.status // ""')" != "PRE_WARM_COMPLETE" ]; then
            echo "FATAL: Pre-warm timed out after 20 minutes"
            exit 1
          fi

      # ── Step 3: Set maintenance mode + backup old instance ──
      # Old instance is untouched until this point. Maintenance mode blocks
      # writes (503) so the backup captures ALL data. If anything fails later,
      # we disable maintenance mode and old resumes normally.
      - name: Maintenance mode and backup
        if: steps.infra.outputs.old_instance != ''
        id: backup
        run: |
          OLD_INSTANCE="${{ steps.infra.outputs.old_instance }}"
          S3_BUCKET="${{ steps.infra.outputs.s3_bucket }}"

          # Check old instance is running
          STATE=$(aws ec2 describe-instances --instance-ids "$OLD_INSTANCE" \
            --query 'Reservations[0].Instances[0].State.Name' --output text 2>/dev/null || echo "unknown")
          if [ "$STATE" != "running" ]; then
            echo "FATAL: Old instance $OLD_INSTANCE is not running (state: $STATE)"
            exit 1
          fi

          # Trigger backup (pre-deploy.sh enables maintenance mode first, then exports + uploads)
          echo "Triggering pre-deploy on $OLD_INSTANCE (maintenance mode + backup + upload)..."
          echo "maintenance_enabled=true" >> $GITHUB_OUTPUT
          echo '{"github_run_id":"${{ github.run_id }}","old_instance":"'$OLD_INSTANCE'","state":"backup_started","started_at":"'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"}' | \
            aws s3 cp - "s3://$S3_BUCKET/deploy/deploy-state.json"

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$OLD_INSTANCE" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=["sudo /opt/lightfriend/pre-deploy.sh"]' \
            --timeout-seconds 900 \
            --query "Command.CommandId" --output text)

          for i in $(seq 1 90); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" --instance-id "$OLD_INSTANCE" \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            echo "Backup status ($i/90): $STATUS"
            case "$STATUS" in
              Success) echo "Backup completed"; break ;;
              Failed|TimedOut|Cancelled)
                echo "FATAL: Backup failed: $STATUS"
                aws ssm get-command-invocation --command-id "$COMMAND_ID" \
                  --instance-id "$OLD_INSTANCE" --query "StandardErrorContent" \
                  --output text 2>/dev/null || true
                exit 1 ;;
            esac
            sleep 10
          done
          if [ "$STATUS" != "Success" ]; then
            echo "FATAL: Backup timed out"; exit 1
          fi

          # Verify backup exists in S3 (size already verified by upload-backup.sh)
          LATEST_BACKUP=$(aws s3 ls "s3://$S3_BUCKET/backups/" | sort | tail -1 | awk '{print $4}')
          if [ -z "$LATEST_BACKUP" ]; then
            echo "FATAL: No backup found in S3 after export"; exit 1
          fi
          echo "## Backup: $LATEST_BACKUP" >> $GITHUB_STEP_SUMMARY

      # ── Step 4: Signal new instance to proceed ──
      - name: Signal proceed
        run: |
          NEW_INSTANCE="${{ steps.launch.outputs.new_instance }}"
          S3_BUCKET="${{ steps.infra.outputs.s3_bucket }}"

          echo '{"proceed": true, "timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"}' | \
            aws s3 cp - "s3://$S3_BUCKET/deploy/proceed-$NEW_INSTANCE.json"
          echo "Proceed signal sent to $NEW_INSTANCE"

      # ── Step 5: Wait for new enclave to restore, verify, become healthy ──
      - name: Wait for enclave health
        id: health
        run: |
          NEW_INSTANCE="${{ steps.launch.outputs.new_instance }}"
          OLD_INSTANCE="${{ steps.infra.outputs.old_instance }}"
          S3_BUCKET="${{ steps.infra.outputs.s3_bucket }}"

          echo "Waiting for enclave health on $NEW_INSTANCE..."
          for i in $(seq 1 120); do
            VERIFY=$(aws s3 cp "s3://$S3_BUCKET/deploy/verify-$NEW_INSTANCE.json" - 2>/dev/null || echo "")
            if [ -n "$VERIFY" ]; then
              echo "$VERIFY" | jq .
              STATUS=$(echo "$VERIFY" | jq -r '.status // "UNKNOWN"')
              RESTORE_TYPE=$(echo "$VERIFY" | jq -r '.restore_type // "unknown"')
              USER_COUNT=$(echo "$VERIFY" | jq -r '.user_count // 0')

              echo "## Health: $STATUS | restore: $RESTORE_TYPE | users: $USER_COUNT" >> $GITHUB_STEP_SUMMARY

              if [ "$STATUS" != "HEALTHY" ]; then
                echo "FATAL: Enclave not healthy: $STATUS"
                echo "Details: $(echo "$VERIFY" | jq -r '.details // .failed_checks // "none"')"
                exit 1
              fi
              if [ -n "$OLD_INSTANCE" ]; then
                if [ "$RESTORE_TYPE" = "fresh_start" ]; then
                  echo "FATAL: New enclave started fresh but old had data"; exit 1
                fi
                if [ "$USER_COUNT" -eq 0 ]; then
                  echo "FATAL: New enclave has 0 users but old had data"; exit 1
                fi
                echo "Data migration verified: $USER_COUNT users"
              fi
              # Verify cloudflared is confirmed running (included in HEALTHY check)
              CF_CHECK=$(echo "$VERIFY" | jq -r '.checks.cloudflared // "missing"')
              if [ "$CF_CHECK" != "true" ]; then
                echo "FATAL: Cloudflared not confirmed running in verify result"
                exit 1
              fi
              echo "healthy=true" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "Waiting ($i/120)..."
            sleep 10
          done
          echo "FATAL: Health check timed out after 20 minutes"; exit 1

      # ── Step 6: Switch traffic to new instance ──
      - name: Switch to new instance
        if: steps.health.outputs.healthy == 'true'
        run: |
          NEW_INSTANCE="${{ steps.launch.outputs.new_instance }}"
          OLD_INSTANCE="${{ steps.infra.outputs.old_instance }}"
          S3_BUCKET="${{ steps.infra.outputs.s3_bucket }}"

          aws ssm put-parameter --name /lightfriend/instance-id \
            --value "$NEW_INSTANCE" --type String --overwrite
          echo "SSM updated to $NEW_INSTANCE"

          # Brief grace period then terminate old
          sleep 15
          if [ -n "$OLD_INSTANCE" ] && [ "$OLD_INSTANCE" != "$NEW_INSTANCE" ]; then
            aws ec2 terminate-instances --instance-ids "$OLD_INSTANCE"
            echo "Old instance $OLD_INSTANCE terminated"
          fi

          echo '{"github_run_id":"${{ github.run_id }}","old_instance":"'$OLD_INSTANCE'","new_instance":"'$NEW_INSTANCE'","state":"complete","completed_at":"'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"}' | \
            aws s3 cp - "s3://$S3_BUCKET/deploy/deploy-state.json"

          cat <<EOF | aws s3 cp - "s3://$S3_BUCKET/deploy/logs/deploy-${{ github.run_id }}.json"
          {"deploy_id":"${{ github.run_id }}","commit_sha":"${{ github.sha }}","completed_at":"$(date -u +%Y-%m-%dT%H:%M:%SZ)","outcome":"SUCCESS","old_instance":"$OLD_INSTANCE","new_instance":"$NEW_INSTANCE"}
          EOF

          aws s3 rm "s3://$S3_BUCKET/deploy/verify-$NEW_INSTANCE.json" 2>/dev/null || true
          aws s3 rm "s3://$S3_BUCKET/deploy/pre-warm-$NEW_INSTANCE.json" 2>/dev/null || true
          aws s3 rm "s3://$S3_BUCKET/deploy/proceed-$NEW_INSTANCE.json" 2>/dev/null || true

          echo "## Deploy Complete" >> $GITHUB_STEP_SUMMARY

      # ── Rollback: disable maintenance on old, terminate new ──
      - name: Rollback on failure
        if: failure() && steps.launch.outputs.new_instance != ''
        run: |
          NEW_INSTANCE="${{ steps.launch.outputs.new_instance }}"
          OLD_INSTANCE="${{ steps.infra.outputs.old_instance }}"
          S3_BUCKET="${{ steps.infra.outputs.s3_bucket }}"

          echo "ROLLING BACK: terminating new instance $NEW_INSTANCE"

          # Disable maintenance mode on old instance (restore normal operation)
          if [ -n "$OLD_INSTANCE" ] && [ "${{ steps.backup.outputs.maintenance_enabled }}" = "true" ]; then
            echo "Disabling maintenance mode on old instance..."
            MAINT_CMD=$(aws ssm send-command \
              --instance-ids "$OLD_INSTANCE" \
              --document-name "AWS-RunShellScript" \
              --parameters 'commands=["sudo /opt/lightfriend/trigger-maintenance.sh disable"]' \
              --timeout-seconds 30 \
              --query "Command.CommandId" --output text 2>/dev/null || echo "")

            if [ -n "$MAINT_CMD" ]; then
              # Wait for SSM command to complete (up to 60s)
              for i in $(seq 1 12); do
                MAINT_STATUS=$(aws ssm get-command-invocation --command-id "$MAINT_CMD" --instance-id "$OLD_INSTANCE" \
                  --query "Status" --output text 2>/dev/null || echo "Pending")
                case "$MAINT_STATUS" in
                  Success) echo "Maintenance mode disabled - old instance fully operational"; break ;;
                  Failed|TimedOut|Cancelled)
                    echo "WARNING: Maintenance disable command $MAINT_STATUS - retrying..."
                    aws ssm send-command --instance-ids "$OLD_INSTANCE" \
                      --document-name "AWS-RunShellScript" \
                      --parameters 'commands=["sudo /opt/lightfriend/trigger-maintenance.sh disable"]' \
                      --timeout-seconds 30 2>/dev/null || true
                    break ;;
                esac
                sleep 5
              done
            else
              echo "CRITICAL: Could not send maintenance disable command via SSM"
              echo "MANUAL ACTION REQUIRED: SSH to $OLD_INSTANCE and run: sudo /opt/lightfriend/trigger-maintenance.sh disable"
            fi
          fi

          # Restore SSM to old instance
          if [ -n "$OLD_INSTANCE" ]; then
            aws ssm put-parameter --name /lightfriend/instance-id \
              --value "$OLD_INSTANCE" --type String --overwrite 2>/dev/null || true
          fi

          aws ec2 terminate-instances --instance-ids "$NEW_INSTANCE" 2>/dev/null || true

          cat <<EOF | aws s3 cp - "s3://$S3_BUCKET/deploy/logs/deploy-${{ github.run_id }}.json"
          {"deploy_id":"${{ github.run_id }}","commit_sha":"${{ github.sha }}","completed_at":"$(date -u +%Y-%m-%dT%H:%M:%SZ)","outcome":"ROLLBACK","old_instance":"$OLD_INSTANCE","new_instance":"$NEW_INSTANCE"}
          EOF

          # Clean up S3 signals
          aws s3 rm "s3://$S3_BUCKET/deploy/verify-$NEW_INSTANCE.json" 2>/dev/null || true
          aws s3 rm "s3://$S3_BUCKET/deploy/pre-warm-$NEW_INSTANCE.json" 2>/dev/null || true
          aws s3 rm "s3://$S3_BUCKET/deploy/proceed-$NEW_INSTANCE.json" 2>/dev/null || true

          echo "## ROLLBACK - old instance $OLD_INSTANCE restored" >> $GITHUB_STEP_SUMMARY

