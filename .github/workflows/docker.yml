name: Docker Build & Deploy

on:
  push:
    branches:
      - main
      - master

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: docker.io
  IMAGE_REPO: docker.io/ahtavarasmus/lightfriend-enclave

jobs:
  check-secrets:
    runs-on: ubuntu-latest
    outputs:
      has-secrets: ${{ steps.check.outputs.has-secrets }}
    steps:
      - id: check
        env:
          HAS_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          HAS_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -n "$HAS_USERNAME" ] && [ -n "$HAS_TOKEN" ]; then
            echo "has-secrets=true" >> $GITHUB_OUTPUT
          else
            echo "has-secrets=false" >> $GITHUB_OUTPUT
          fi

  build-and-push:
    needs: check-secrets
    if: needs.check-secrets.outputs.has-secrets == 'true'
    runs-on: ubuntu-latest
    outputs:
      image_digest: ${{ steps.image.outputs.image_digest }}
      image_ref: ${{ steps.image.outputs.image_ref }}
    permissions:
      contents: read
      packages: write

    concurrency:
      group: docker-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo apt-get clean

      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_REPO }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: enclave/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1

      - name: Export image outputs
        id: image
        run: |
          DIGEST="${{ steps.build.outputs.digest }}"
          [ -n "$DIGEST" ] || { echo "FATAL: docker/build-push-action did not return a digest"; exit 1; }
          case "$DIGEST" in
            sha256:*) ;;
            *) echo "FATAL: unexpected image digest format: $DIGEST"; exit 1 ;;
          esac
          IMAGE_REF="${{ env.IMAGE_REPO }}@$DIGEST"
          echo "image_digest=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "image_ref=$IMAGE_REF" >> "$GITHUB_OUTPUT"
          echo "Resolved image ref: $IMAGE_REF"

          cat > /tmp/image-build.json <<EOF
          {"image_repo":"${{ env.IMAGE_REPO }}","image_digest":"$DIGEST","image_ref":"$IMAGE_REF","commit_sha":"${{ github.sha }}"}
          EOF

      - name: Upload image build artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-build-${{ github.sha }}
          path: /tmp/image-build.json

  build-eif:
    needs: [check-secrets, build-and-push]
    if: needs.check-secrets.outputs.has-secrets == 'true' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    outputs:
      eif_key: ${{ steps.publish.outputs.eif_key }}
      metadata_key: ${{ steps.publish.outputs.metadata_key }}
      public_metadata_url: ${{ steps.publish.outputs.public_metadata_url }}
      eif_sha256: ${{ steps.publish.outputs.eif_sha256 }}
      pcr0: ${{ steps.publish.outputs.pcr0 }}
      pcr1: ${{ steps.publish.outputs.pcr1 }}
      pcr2: ${{ steps.publish.outputs.pcr2 }}
      image_ref: ${{ steps.build_meta.outputs.image_ref }}
    permissions:
      id-token: write
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download image build artifact
        uses: actions/download-artifact@v4
        with:
          name: image-build-${{ github.sha }}
          path: /tmp/image-build

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: Read infrastructure parameters
        id: infra
        run: |
          S3_BUCKET=$(aws ssm get-parameter --name /lightfriend/s3-bucket --query Parameter.Value --output text)
          echo "s3_bucket=$S3_BUCKET" >> $GITHUB_OUTPUT

      - name: Install Nitro CLI build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang llvm-dev libclang-dev pkg-config libssl-dev protobuf-compiler musl-tools

      - name: Build Nitro CLI
        run: |
          git clone --depth 1 https://github.com/aws/aws-nitro-enclaves-cli /tmp/aws-nitro-enclaves-cli
          cd /tmp/aws-nitro-enclaves-cli
          make nitro-cli
          sudo install -m 0755 "$(find build -type f -name nitro-cli | head -1)" /usr/local/bin/nitro-cli
          nitro-cli --version

      - name: Prepare Nitro CLI filesystem layout
        run: |
          sudo mkdir -p \
            /var/log/nitro_enclaves \
            /usr/share/nitro_enclaves \
            /usr/share/nitro_enclaves/blobs \
            /run/nitro_enclaves \
            /etc/nitro_enclaves
          sudo touch /var/log/nitro_enclaves/nitro_enclaves.log
          sudo chown -R "$USER":"$USER" \
            /var/log/nitro_enclaves \
            /usr/share/nitro_enclaves \
            /run/nitro_enclaves \
            /etc/nitro_enclaves
          sudo chmod 755 \
            /var/log/nitro_enclaves \
            /usr/share/nitro_enclaves \
            /usr/share/nitro_enclaves/blobs \
            /run/nitro_enclaves \
            /etc/nitro_enclaves
          sudo chmod 664 /var/log/nitro_enclaves/nitro_enclaves.log

      - name: Install Nitro CLI build blobs
        run: |
          ARCH="$(uname -m)"
          case "$ARCH" in
            x86_64|amd64) BLOB_ARCH="x86_64" ;;
            aarch64|arm64) BLOB_ARCH="aarch64" ;;
            *) echo "FATAL: unsupported architecture for Nitro blobs: $ARCH"; exit 1 ;;
          esac
          [ -d "/tmp/aws-nitro-enclaves-cli/blobs/$BLOB_ARCH" ] || { echo "FATAL: Nitro blobs missing for architecture $BLOB_ARCH"; exit 1; }
          sudo cp -R "/tmp/aws-nitro-enclaves-cli/blobs/$BLOB_ARCH/." /usr/share/nitro_enclaves/blobs/
          sudo chmod -R a+rX /usr/share/nitro_enclaves/blobs
          ls -lah /usr/share/nitro_enclaves/blobs

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build EIF from immutable image digest
        id: build_meta
        run: |
          IMAGE_REF="$(jq -r '.image_ref // empty' /tmp/image-build/image-build.json)"
          IMAGE_DIGEST="$(jq -r '.image_digest // empty' /tmp/image-build/image-build.json)"
          [ -n "$IMAGE_REF" ] || { echo "FATAL: build-and-push did not provide image_ref"; exit 1; }
          case "$IMAGE_DIGEST" in
            sha256:*) ;;
            *) echo "FATAL: image build artifact has unexpected digest format: $IMAGE_DIGEST"; exit 1 ;;
          esac
          case "$IMAGE_REF" in
            docker.io/*@sha256:*) ;;
            *) echo "FATAL: image build artifact has unexpected image_ref format: $IMAGE_REF"; exit 1 ;;
          esac
          echo "image_ref=$IMAGE_REF" >> $GITHUB_OUTPUT
          docker manifest inspect "$IMAGE_REF" > /tmp/image-manifest.json
          docker pull "$IMAGE_REF"
          nitro-cli build-enclave --docker-uri "$IMAGE_REF" --output-file lightfriend.eif 2>&1 | tee /tmp/eif-build.log
          [ -f lightfriend.eif ] || { echo "FATAL: nitro-cli did not produce lightfriend.eif"; tail -50 /tmp/eif-build.log; exit 1; }
          sed -n '/^{/,/^}$/p' /tmp/eif-build.log > /tmp/eif-measurements.json
          PCR0=$(jq -r '.Measurements.PCR0 // empty' /tmp/eif-measurements.json | tr '[:upper:]' '[:lower:]')
          PCR1=$(jq -r '.Measurements.PCR1 // empty' /tmp/eif-measurements.json | tr '[:upper:]' '[:lower:]')
          PCR2=$(jq -r '.Measurements.PCR2 // empty' /tmp/eif-measurements.json | tr '[:upper:]' '[:lower:]')
          [ -n "$PCR0" ] || { echo "FATAL: Missing PCR0 from nitro-cli output"; tail -50 /tmp/eif-build.log; exit 1; }
          [ -n "$PCR1" ] || { echo "FATAL: Missing PCR1 from nitro-cli output"; tail -50 /tmp/eif-build.log; exit 1; }
          [ -n "$PCR2" ] || { echo "FATAL: Missing PCR2 from nitro-cli output"; tail -50 /tmp/eif-build.log; exit 1; }

      - name: Publish EIF metadata
        id: publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          S3_BUCKET="${{ steps.infra.outputs.s3_bucket }}"
          IMAGE_REF="${{ steps.build_meta.outputs.image_ref }}"
          EIF_KEY="eif/${{ github.sha }}/lightfriend.eif"
          METADATA_KEY="eif/${{ github.sha }}/metadata.json"
          EIF_SHA256=$(sha256sum lightfriend.eif | awk '{print $1}')
          PCR0=$(jq -r '.Measurements.PCR0 // empty' /tmp/eif-measurements.json | tr '[:upper:]' '[:lower:]')
          PCR1=$(jq -r '.Measurements.PCR1 // empty' /tmp/eif-measurements.json | tr '[:upper:]' '[:lower:]')
          PCR2=$(jq -r '.Measurements.PCR2 // empty' /tmp/eif-measurements.json | tr '[:upper:]' '[:lower:]')

          aws s3 cp lightfriend.eif "s3://$S3_BUCKET/$EIF_KEY"

          cat > /tmp/eif-metadata.json <<EOF
          {"commit_sha":"${{ github.sha }}","image_ref":"$IMAGE_REF","eif_key":"$EIF_KEY","eif_sha256":"$EIF_SHA256","pcr0":"0x$PCR0","pcr1":"0x$PCR1","pcr2":"0x$PCR2","workflow_run_id":"${{ github.run_id }}","built_at":"$(date -u +%Y-%m-%dT%H:%M:%SZ)"}
          EOF

          aws s3 cp /tmp/eif-metadata.json "s3://$S3_BUCKET/$METADATA_KEY"

          PUBLIC_DIR="$(mktemp -d)"
          git init "$PUBLIC_DIR"
          cd "$PUBLIC_DIR"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"

          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch --depth 1 origin gh-pages
            git checkout -B gh-pages origin/gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf . >/dev/null 2>&1 || true
          fi

          mkdir -p verification/commits
          cp /tmp/eif-metadata.json "verification/commits/${{ github.sha }}.json"
          cp /tmp/eif-metadata.json verification/latest.json

          cat > verification/index.json <<EOF
          {"latest_commit":"${{ github.sha }}","latest_metadata_url":"https://raw.githubusercontent.com/${{ github.repository }}/gh-pages/verification/commits/${{ github.sha }}.json","updated_at":"$(date -u +%Y-%m-%dT%H:%M:%SZ)"}
          EOF

          git add verification/commits/${{ github.sha }}.json verification/latest.json verification/index.json
          git commit -m "Publish EIF metadata for ${{ github.sha }}" || true
          git push origin HEAD:gh-pages

          PUBLIC_METADATA_URL="https://raw.githubusercontent.com/${{ github.repository }}/gh-pages/verification/commits/${{ github.sha }}.json"

          echo "eif_key=$EIF_KEY" >> $GITHUB_OUTPUT
          echo "metadata_key=$METADATA_KEY" >> $GITHUB_OUTPUT
          echo "public_metadata_url=$PUBLIC_METADATA_URL" >> $GITHUB_OUTPUT
          echo "eif_sha256=$EIF_SHA256" >> $GITHUB_OUTPUT
          echo "pcr0=0x$PCR0" >> $GITHUB_OUTPUT
          echo "pcr1=0x$PCR1" >> $GITHUB_OUTPUT
          echo "pcr2=0x$PCR2" >> $GITHUB_OUTPUT

          echo "## CI EIF Build" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- Image: $IMAGE_REF" >> $GITHUB_STEP_SUMMARY
          echo "- EIF key: $EIF_KEY" >> $GITHUB_STEP_SUMMARY
          echo "- Public metadata URL: $PUBLIC_METADATA_URL" >> $GITHUB_STEP_SUMMARY
          echo "- EIF sha256: $EIF_SHA256" >> $GITHUB_STEP_SUMMARY
          echo "- PCR0: 0x$PCR0" >> $GITHUB_STEP_SUMMARY
          echo "- PCR1: 0x$PCR1" >> $GITHUB_STEP_SUMMARY
          echo "- PCR2: 0x$PCR2" >> $GITHUB_STEP_SUMMARY

      - name: Upload EIF metadata artifact
        uses: actions/upload-artifact@v4
        with:
          name: eif-metadata-${{ github.sha }}
          path: /tmp/eif-metadata.json

  deploy:
    needs: [build-and-push, build-eif]
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read

    # NEVER cancel a running deploy - it must complete or roll back
    concurrency:
      group: deploy-production
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Read infrastructure parameters
        id: infra
        run: |
          S3_BUCKET=$(aws ssm get-parameter --name /lightfriend/s3-bucket --query Parameter.Value --output text)
          LAUNCH_TEMPLATE=$(aws ssm get-parameter --name /lightfriend/launch-template-id --query Parameter.Value --output text)
          SUBNET_ID=$(aws ssm get-parameter --name /lightfriend/subnet-id --query Parameter.Value --output text)
          OLD_INSTANCE=$(aws ssm get-parameter --name /lightfriend/instance-id --query Parameter.Value --output text 2>/dev/null || echo "")

          echo "s3_bucket=$S3_BUCKET" >> $GITHUB_OUTPUT
          echo "launch_template=$LAUNCH_TEMPLATE" >> $GITHUB_OUTPUT
          echo "subnet_id=$SUBNET_ID" >> $GITHUB_OUTPUT
          echo "old_instance=$OLD_INSTANCE" >> $GITHUB_OUTPUT

          echo "## Deploy Parameters" >> $GITHUB_STEP_SUMMARY
          echo "- S3 Bucket: $S3_BUCKET" >> $GITHUB_STEP_SUMMARY
          echo "- Launch Template: $LAUNCH_TEMPLATE" >> $GITHUB_STEP_SUMMARY
          echo "- Old Instance: ${OLD_INSTANCE:-none (first deploy)}" >> $GITHUB_STEP_SUMMARY

      # ── Safety: warn if hourly snapshot backups have been failing ──
      - name: Check backup health
        run: |
          S3_BUCKET="${{ steps.infra.outputs.s3_bucket }}"
          HEALTH=$(aws s3 cp "s3://$S3_BUCKET/backups/backup-health.json" - 2>/dev/null || echo "")
          if [ -n "$HEALTH" ]; then
            LAST_SUCCESS=$(echo "$HEALTH" | jq -r '.last_success // "never"')
            LAST_FAILURE=$(echo "$HEALTH" | jq -r '.last_failure // "none"')
            LAST_TYPE=$(echo "$HEALTH" | jq -r '.type // "unknown"')
            LAST_KEY=$(echo "$HEALTH" | jq -r '.backup_key // "unknown"')
            echo "## Backup Health" >> $GITHUB_STEP_SUMMARY
            echo "- Last successful backup: $LAST_SUCCESS ($LAST_TYPE)" >> $GITHUB_STEP_SUMMARY
            echo "- Last verified backup key: $LAST_KEY" >> $GITHUB_STEP_SUMMARY
            if [ "$LAST_FAILURE" != "none" ] && [ "$LAST_FAILURE" != "null" ]; then
              echo "- :warning: Last failure: $LAST_FAILURE" >> $GITHUB_STEP_SUMMARY
            fi
            # Warn but don't block - the deploy itself takes a fresh full backup
            if [ "$LAST_SUCCESS" = "never" ]; then
              echo "WARNING: No successful scheduled backup recorded"
            fi
          else
            echo "No backup health marker found (first deploy or scheduled backups not yet configured)"
          fi

      # ── Safety: clean up orphaned instances from crashed prior deploys ──
      - name: Cleanup stale deploys
        run: |
          S3_BUCKET="${{ steps.infra.outputs.s3_bucket }}"
          CURRENT_LIVE="${{ steps.infra.outputs.old_instance }}"

          # Clean ALL stale deploy signal files from S3.
          # These can cause deploys to read stale results and fail instantly.
          echo "Cleaning stale deploy signals from S3..."
          aws s3 rm "s3://$S3_BUCKET/deploy/export-complete.json" 2>/dev/null || true
          aws s3 rm "s3://$S3_BUCKET/deploy/export-request.json" 2>/dev/null || true
          # Clean old per-instance signal files (eif, pre-warm, restore, verify)
          for prefix in eif- pre-warm- restore- verify-; do
            aws s3 ls "s3://$S3_BUCKET/deploy/${prefix}" 2>/dev/null | awk '{print $4}' | while read -r key; do
              [ -n "$key" ] && aws s3 rm "s3://$S3_BUCKET/deploy/$key" 2>/dev/null || true
            done
          done
          echo "Stale signals cleaned"

          STALE_STATE=$(aws s3 cp "s3://$S3_BUCKET/deploy/deploy-state.json" - 2>/dev/null || echo "")
          if [ -n "$STALE_STATE" ]; then
            STALE_STATUS=$(echo "$STALE_STATE" | jq -r '.state // "unknown"')
            ORPHAN_INSTANCE=$(echo "$STALE_STATE" | jq -r '.new_instance // ""')
            STALE_RUN=$(echo "$STALE_STATE" | jq -r '.github_run_id // "unknown"')

            if [ "$STALE_STATUS" != "complete" ] && [ -n "$ORPHAN_INSTANCE" ]; then
              # CRITICAL: never terminate the instance SSM says is live
              if [ "$ORPHAN_INSTANCE" = "$CURRENT_LIVE" ]; then
                echo "WARNING: Orphan instance $ORPHAN_INSTANCE is the current live instance - NOT terminating"
              else
                echo "WARNING: Found orphaned deploy from run $STALE_RUN (state: $STALE_STATUS)"
                echo "Terminating orphan instance $ORPHAN_INSTANCE..."
                aws ec2 terminate-instances --instance-ids "$ORPHAN_INSTANCE" 2>/dev/null || true
                echo "Orphan cleaned up"
              fi
            fi
            aws s3 rm "s3://$S3_BUCKET/deploy/deploy-state.json" 2>/dev/null || true
          fi

      # ── Step 0: Ensure launch template is up to date ──
      # Skipped until TF_API_TOKEN is configured. Run terraform apply manually
      # when user_data.sh changes. See DEPLOY_CLEANUP.md for details.

      # ── Step 1: Launch new EC2 and pre-warm ──
      - name: Launch new EC2 instance
        id: launch
        run: |
          LAUNCH_TEMPLATE="${{ steps.infra.outputs.launch_template }}"
          SUBNET_ID="${{ steps.infra.outputs.subnet_id }}"
          S3_BUCKET="${{ steps.infra.outputs.s3_bucket }}"

          echo "Launching new EC2 from template $LAUNCH_TEMPLATE..."
          NEW_INSTANCE=$(aws ec2 run-instances \
            --launch-template LaunchTemplateId="$LAUNCH_TEMPLATE",Version='$Latest' \
            --subnet-id "$SUBNET_ID" \
            --query 'Instances[0].InstanceId' \
            --output text)

          echo "new_instance=$NEW_INSTANCE" >> $GITHUB_OUTPUT
          echo "## New Instance: $NEW_INSTANCE" >> $GITHUB_STEP_SUMMARY

          echo '{"github_run_id":"${{ github.run_id }}","old_instance":"${{ steps.infra.outputs.old_instance }}","new_instance":"'$NEW_INSTANCE'","state":"pre_warming","started_at":"'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"}' | \
            aws s3 cp - "s3://$S3_BUCKET/deploy/deploy-state.json"

          aws ec2 wait instance-running --instance-ids "$NEW_INSTANCE"
          echo "Instance running, waiting for CI-built EIF manifest"

      - name: Publish EIF manifest for new instance
        run: |
          NEW_INSTANCE="${{ steps.launch.outputs.new_instance }}"
          S3_BUCKET="${{ steps.infra.outputs.s3_bucket }}"

          cat <<EOF | aws s3 cp - "s3://$S3_BUCKET/deploy/eif-$NEW_INSTANCE.json"
          {"commit_sha":"${{ github.sha }}","image_ref":"${{ needs.build-eif.outputs.image_ref }}","eif_key":"${{ needs.build-eif.outputs.eif_key }}","eif_sha256":"${{ needs.build-eif.outputs.eif_sha256 }}","pcr0":"${{ needs.build-eif.outputs.pcr0 }}","pcr1":"${{ needs.build-eif.outputs.pcr1 }}","pcr2":"${{ needs.build-eif.outputs.pcr2 }}","workflow_run_id":"${{ github.run_id }}","public_metadata_url":"${{ needs.build-eif.outputs.public_metadata_url }}","published_at":"$(date -u +%Y-%m-%dT%H:%M:%SZ)"}
          EOF
          echo "EIF manifest published for $NEW_INSTANCE"

      # ── Step 2: Wait for new instance pre-warm to complete ──
      - name: Wait for pre-warm
        id: prewarm
        run: |
          NEW_INSTANCE="${{ steps.launch.outputs.new_instance }}"
          S3_BUCKET="${{ steps.infra.outputs.s3_bucket }}"

          echo "Waiting for pre-warm to complete on $NEW_INSTANCE..."
          for i in $(seq 1 120); do
            RESULT=$(aws s3 cp "s3://$S3_BUCKET/deploy/pre-warm-$NEW_INSTANCE.json" - 2>/dev/null || echo "")
            if [ -n "$RESULT" ]; then
              STATUS=$(echo "$RESULT" | jq -r '.status // "UNKNOWN"')
              echo "Pre-warm result: $STATUS"
              if [ "$STATUS" = "PRE_WARM_COMPLETE" ]; then
                echo "pre_warm_done=true" >> $GITHUB_OUTPUT
                EIF_SHA=$(echo "$RESULT" | jq -r '.eif_sha256 // empty')
                if [ "$EIF_SHA" != "${{ needs.build-eif.outputs.eif_sha256 }}" ]; then
                  echo "FATAL: pre-warm reported unexpected EIF sha256: $EIF_SHA"
                  exit 1
                fi
                echo "## Pre-warm complete" >> $GITHUB_STEP_SUMMARY
                echo "- EIF sha256: $EIF_SHA" >> $GITHUB_STEP_SUMMARY
                echo "- PCR0: ${{ needs.build-eif.outputs.pcr0 }}" >> $GITHUB_STEP_SUMMARY
                break
              else
                echo "FATAL: Pre-warm failed: $STATUS"
                echo "$RESULT" | jq .
                exit 1
              fi
            fi
            echo "Pre-warming ($i/120)..."
            sleep 10
          done

          if [ "$(echo "$RESULT" | jq -r '.status // ""')" != "PRE_WARM_COMPLETE" ]; then
            echo "FATAL: Pre-warm timed out after 20 minutes"
            exit 1
          fi

      # ── Step 3: Approve new image for Marlin KMS ──
      # The root server computes image_id = SHA-256(bitflags || PCR0 || PCR1 || PCR2 || PCR16)
      # and checks oysterKMSVerify(image_id) on the contract. We must register the
      # same hash on-chain so the root server accepts our enclave's attestation.
      - name: Approve image for Marlin KMS
        id: approve
        env:
          CONTRACT_ADDRESS: ${{ secrets.MARLIN_KMS_CONTRACT_ADDRESS }}
          RPC_URL: ${{ secrets.ARBITRUM_RPC_URL }}
          PRIVATE_KEY: ${{ secrets.ARBITRUM_PRIVATE_KEY }}
        run: |
          PCR0="${{ needs.build-eif.outputs.pcr0 }}"
          PCR1="${{ needs.build-eif.outputs.pcr1 }}"
          PCR2="${{ needs.build-eif.outputs.pcr2 }}"
          COMMIT_SHA="${{ github.sha }}"
          [ -n "$CONTRACT_ADDRESS" ] || { echo "FATAL: MARLIN_KMS_CONTRACT_ADDRESS secret missing"; exit 1; }
          [ -n "$RPC_URL" ] || { echo "FATAL: ARBITRUM_RPC_URL secret missing"; exit 1; }
          [ -n "$PRIVATE_KEY" ] || { echo "FATAL: ARBITRUM_PRIVATE_KEY secret missing"; exit 1; }
          [ -n "$PCR0" ] || { echo "FATAL: Missing PCR0"; exit 1; }
          [ -n "$PCR1" ] || { echo "FATAL: Missing PCR1"; exit 1; }
          [ -n "$PCR2" ] || { echo "FATAL: Missing PCR2"; exit 1; }

          # Compute image_id matching Marlin root server's algorithm:
          # SHA-256(bitflags_u32_be(0x00010007) || PCR0[48] || PCR1[48] || PCR2[48] || PCR16[48])
          # PCR16 is all zeros (no user data passed to attestation server)
          IMAGE_ID=$(python3 -c "
          import hashlib, struct
          bitflags = struct.pack('>I', (1 << 0) | (1 << 1) | (1 << 2) | (1 << 16))
          pcr0 = bytes.fromhex('${PCR0#0x}')
          pcr1 = bytes.fromhex('${PCR1#0x}')
          pcr2 = bytes.fromhex('${PCR2#0x}')
          pcr16 = b'\x00' * 48
          image_id = hashlib.sha256(bitflags + pcr0 + pcr1 + pcr2 + pcr16).hexdigest()
          print('0x' + image_id)
          ")
          echo "Computed image_id: $IMAGE_ID"
          echo "  from PCR0=$PCR0"
          echo "  from PCR1=$PCR1"
          echo "  from PCR2=$PCR2"
          echo "  PCR16=zeros"

          VERIFY_BEFORE=$(cast call "$CONTRACT_ADDRESS" "oysterKMSVerify(bytes32)(bool)" "$IMAGE_ID" --rpc-url "$RPC_URL")
          if [ "$VERIFY_BEFORE" != "true" ]; then
            echo "Image not yet approved, registering..."
            cast send "$CONTRACT_ADDRESS" "proposeImage(bytes32,string)" "$IMAGE_ID" "$COMMIT_SHA" \
              --rpc-url "$RPC_URL" \
              --private-key "$PRIVATE_KEY"

            cast send "$CONTRACT_ADDRESS" "activateImage()" \
              --rpc-url "$RPC_URL" \
              --private-key "$PRIVATE_KEY"
          else
            echo "Image already approved"
          fi

          VERIFY_AFTER=$(cast call "$CONTRACT_ADDRESS" "oysterKMSVerify(bytes32)(bool)" "$IMAGE_ID" --rpc-url "$RPC_URL")
          if [ "$VERIFY_AFTER" != "true" ]; then
            echo "FATAL: Contract did not verify image_id $IMAGE_ID after approval"
            exit 1
          fi
          echo "Image approved and verified on Arbitrum"

          echo "image_id=$IMAGE_ID" >> $GITHUB_OUTPUT
          echo "## Marlin KMS Approval" >> $GITHUB_STEP_SUMMARY
          echo "- Contract: $CONTRACT_ADDRESS" >> $GITHUB_STEP_SUMMARY
          echo "- Image ID: $IMAGE_ID" >> $GITHUB_STEP_SUMMARY
          echo "- PCR0: $PCR0" >> $GITHUB_STEP_SUMMARY
          echo "- PCR1: $PCR1" >> $GITHUB_STEP_SUMMARY
          echo "- PCR2: $PCR2" >> $GITHUB_STEP_SUMMARY

      # ── Step 4: Get data source ──
      # Priority 1: Seed dump in S3 (first-time bootstrap from old server)
      # Priority 2: Live export from old instance (normal deploy)
      # Priority 3: Latest encrypted backup from S3 (old instance dead)
      - name: Get data source
        id: backup
        env:
          AWS_DEFAULT_REGION: us-east-1
        run: |
          OLD_INSTANCE="${{ steps.infra.outputs.old_instance }}"
          S3_BUCKET="${{ steps.infra.outputs.s3_bucket }}"

          # ── Priority 1: Seed dump for first-time bootstrap ──
          if aws s3api head-object --bucket "$S3_BUCKET" --key "seed/lightfriend_db.sql" 2>/dev/null; then
            echo "=== Found seed dump in S3 - first-time bootstrap ==="
            echo "backup_key=none" >> $GITHUB_OUTPUT
            echo "backup_sha=none" >> $GITHUB_OUTPUT
            echo "backup_size=0" >> $GITHUB_OUTPUT
            echo "backup_source=seed_dump" >> $GITHUB_OUTPUT
            echo "## Data source: seed dump (first-time bootstrap)" >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          # ── Priority 2: Live export from old instance ──
          LIVE_EXPORT_OK=false

          if [ -n "$OLD_INSTANCE" ]; then
            STATE=$(aws ec2 describe-instances --instance-ids "$OLD_INSTANCE" \
              --query 'Reservations[0].Instances[0].State.Name' --output text 2>/dev/null || echo "unknown")
            if [ "$STATE" != "running" ]; then
              echo "WARNING: Old instance $OLD_INSTANCE is not running (state: $STATE)"
            else
              echo "Triggering export on $OLD_INSTANCE..."

              # Generate presigned S3 URLs so enclave can upload directly to S3
              # (bypasses the slow host s3-signal-poller entirely)
              BACKUP_TIMESTAMP=$(date -u +%Y%m%dT%H%M%SZ)
              BACKUP_S3_KEY="backups/deploy/lightfriend-full-backup-${BACKUP_TIMESTAMP}.tar.gz.enc"
              COMPLETE_S3_KEY="deploy/export-complete.json"

              PRESIGNED_PUT_BACKUP=$(python3 -c "
import boto3; print(boto3.client('s3').generate_presigned_url(
    'put_object',
    Params={'Bucket':'$S3_BUCKET','Key':'$BACKUP_S3_KEY','ContentType':'application/octet-stream'},
    ExpiresIn=3600))")
              PRESIGNED_PUT_COMPLETE=$(python3 -c "
import boto3; print(boto3.client('s3').generate_presigned_url(
    'put_object',
    Params={'Bucket':'$S3_BUCKET','Key':'$COMPLETE_S3_KEY','ContentType':'application/json'},
    ExpiresIn=3600))")

              echo "Generated presigned URLs (valid 1 hour)"
              echo "  Backup key: $BACKUP_S3_KEY"

              # Build trigger JSON with presigned URLs
              TRIGGER=$(python3 -c "
import json; print(json.dumps({
    'action': 'export',
    'type': 'deploy',
    'deploy_id': '${{ github.run_id }}',
    'backup_s3_key': '$BACKUP_S3_KEY',
    'presigned_put_backup_s3': '''$PRESIGNED_PUT_BACKUP''',
    'presigned_put_complete': '''$PRESIGNED_PUT_COMPLETE'''
}))")

              # Write trigger to host via SSM
              echo "Writing export trigger to host via SSM..."
              TRIGGER_CMD=$(aws ssm send-command --instance-ids "$OLD_INSTANCE" \
                --document-name "AWS-RunShellScript" \
                --parameters commands=["rm -f /opt/lightfriend/backups/export-complete.json && cat > /opt/lightfriend/seed/export-request.json << 'TRIGGEREOF'\n${TRIGGER}\nTRIGGEREOF"] \
                --timeout-seconds 30 \
                --query 'Command.CommandId' --output text 2>/dev/null || echo "")
              if [ -z "$TRIGGER_CMD" ]; then
                echo "FATAL: Could not write export trigger via SSM"
                exit 1
              fi

              # Wait for SSM command to complete
              for i in $(seq 1 12); do
                SSM_STATUS=$(aws ssm get-command-invocation --command-id "$TRIGGER_CMD" \
                  --instance-id "$OLD_INSTANCE" --query 'Status' --output text 2>/dev/null || echo "Pending")
                if [ "$SSM_STATUS" = "Success" ]; then
                  echo "Export trigger written to host"
                  break
                elif [ "$SSM_STATUS" = "Failed" ] || [ "$SSM_STATUS" = "TimedOut" ]; then
                  echo "FATAL: SSM trigger command $SSM_STATUS"
                  exit 1
                fi
                sleep 5
              done

              echo "Polling S3 for export completion (timeout: 10 min)..."
              COMPLETE_STATUS=""
              for i in $(seq 1 120); do
                COMPLETE_JSON=$(aws s3 cp "s3://$S3_BUCKET/deploy/export-complete.json" - 2>/dev/null || echo "")
                if [ -n "$COMPLETE_JSON" ]; then
                  COMPLETE_STATUS=$(echo "$COMPLETE_JSON" | jq -r '.status // "UNKNOWN"' 2>/dev/null || echo "UNKNOWN")
                  if [ "$COMPLETE_STATUS" = "SUCCESS" ]; then
                    echo "Live export completed successfully!"
                    echo "$COMPLETE_JSON" | jq . 2>/dev/null || echo "$COMPLETE_JSON"
                    LIVE_EXPORT_OK=true
                    break
                  elif [ "$COMPLETE_STATUS" = "FAILED" ]; then
                    echo "WARNING: Live export failed inside enclave, will fall back to S3 backup"
                    break
                  fi
                fi
                [ $((i % 6)) -eq 0 ] && echo "Waiting for export ($i/120, status: ${COMPLETE_STATUS:-pending})..."
                sleep 5
              done

              if [ "$LIVE_EXPORT_OK" = "false" ]; then
                echo "FATAL: Live export from old instance failed or timed out"
                echo "Old instance is running but export failed - something is wrong."
                echo "Fix the issue and retry. NOT falling back to S3 backup (data could be stale)."
                exit 1
              fi

              # Clean up S3 signals
              aws s3 rm "s3://$S3_BUCKET/deploy/export-complete.json" 2>/dev/null || true
              aws s3 rm "s3://$S3_BUCKET/deploy/export-request.json" 2>/dev/null || true
            fi
          fi

          if [ "$LIVE_EXPORT_OK" = "true" ]; then
            BACKUP_KEY=$(echo "$COMPLETE_JSON" | jq -r '.backup_key // empty')
            BACKUP_SHA=$(echo "$COMPLETE_JSON" | jq -r '.backup_sha256 // empty')
            BACKUP_SIZE=$(echo "$COMPLETE_JSON" | jq -r '.backup_size // 0')
            BACKUP_SOURCE="live_export"
          else
            # ── Priority 3: Latest encrypted backup from S3 ──
            echo ""
            echo "=== Falling back to latest S3 backup ==="

            LATEST_BACKUP=""
            for PREFIX in "backups/deploy/" "backups/hourly/"; do
              LATEST_BACKUP=$(aws s3 ls "s3://$S3_BUCKET/$PREFIX" --recursive 2>/dev/null | \
                grep '\.tar\.gz\.enc$' | sort -k1,2 | tail -1 | awk '{print $4}')
              if [ -n "$LATEST_BACKUP" ]; then
                echo "Found backup in $PREFIX: $LATEST_BACKUP"
                break
              fi
            done

            if [ -z "$LATEST_BACKUP" ]; then
              echo "FATAL: No data source available - no seed dump, no live instance, no S3 backup"
              exit 1
            fi

            BACKUP_KEY="$LATEST_BACKUP"
            BACKUP_SIZE=$(aws s3api head-object --bucket "$S3_BUCKET" --key "$BACKUP_KEY" \
              --query 'ContentLength' --output text 2>/dev/null || echo "0")
            BACKUP_MODIFIED=$(aws s3api head-object --bucket "$S3_BUCKET" --key "$BACKUP_KEY" \
              --query 'LastModified' --output text 2>/dev/null || echo "unknown")

            TMP_SHA=$(mktemp /tmp/backup-sha.XXXXXX.enc)
            aws s3 cp "s3://$S3_BUCKET/$BACKUP_KEY" "$TMP_SHA"
            BACKUP_SHA=$(sha256sum "$TMP_SHA" | awk '{print $1}')
            rm -f "$TMP_SHA"

            BACKUP_SOURCE="s3_fallback"

            echo "Using S3 fallback backup:"
            echo "  Key: $BACKUP_KEY"
            echo "  Size: $BACKUP_SIZE bytes"
            echo "  Modified: $BACKUP_MODIFIED"
            echo "  SHA256: $BACKUP_SHA"
            echo "  :warning: This may be up to 1 hour behind live data" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -z "$BACKUP_KEY" ] || [ -z "$BACKUP_SHA" ]; then
            echo "FATAL: Missing backup_key or backup_sha256"
            exit 1
          fi

          echo "backup_key=$BACKUP_KEY" >> $GITHUB_OUTPUT
          echo "backup_sha=$BACKUP_SHA" >> $GITHUB_OUTPUT
          echo "backup_size=$BACKUP_SIZE" >> $GITHUB_OUTPUT
          echo "backup_source=$BACKUP_SOURCE" >> $GITHUB_OUTPUT
          echo "## Data source ($BACKUP_SOURCE): $BACKUP_KEY" >> $GITHUB_STEP_SUMMARY

      # ── Step 4b: Deliver seed dump to new instance ──
      # Downloads seed SQL from S3 to the new host's seed dir, then deletes
      # from S3 so it doesn't get used on the next deploy.
      - name: Deliver seed to new instance
        if: steps.backup.outputs.backup_source == 'seed_dump'
        run: |
          NEW_INSTANCE="${{ steps.launch.outputs.new_instance }}"
          S3_BUCKET="${{ steps.infra.outputs.s3_bucket }}"

          echo "Delivering seed SQL to $NEW_INSTANCE..."
          CMD_ID=$(aws ssm send-command --instance-ids "$NEW_INSTANCE" \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":["aws s3 cp s3://'"$S3_BUCKET"'/seed/lightfriend_db.sql /opt/lightfriend/seed/lightfriend_db.sql && ls -la /opt/lightfriend/seed/lightfriend_db.sql"]}' \
            --timeout-seconds 120 \
            --query 'Command.CommandId' --output text)

          for i in $(seq 1 24); do
            STATUS=$(aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$NEW_INSTANCE" \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            case "$STATUS" in
              Success) echo "Seed delivered to new instance"; break ;;
              Failed|TimedOut|Cancelled) echo "FATAL: Seed delivery failed: $STATUS"; exit 1 ;;
            esac
            sleep 5
          done

          # Delete from S3 so it doesn't linger on next deploy
          aws s3 rm "s3://$S3_BUCKET/seed/lightfriend_db.sql"
          echo "Seed removed from S3"

      # ── Step 5: Re-download and validate the exact encrypted artifact ──
      - name: Validate uploaded backup artifact
        if: steps.backup.outputs.backup_source != 'seed_dump'
        run: |
          S3_BUCKET="${{ steps.infra.outputs.s3_bucket }}"
          BACKUP_KEY="${{ steps.backup.outputs.backup_key }}"
          BACKUP_SHA="${{ steps.backup.outputs.backup_sha }}"
          BACKUP_SIZE="${{ steps.backup.outputs.backup_size }}"
          TMP_BACKUP="$(mktemp /tmp/lightfriend-backup.XXXXXX.enc)"

          [ -n "$BACKUP_KEY" ] || { echo "FATAL: Missing backup_key"; exit 1; }
          [ -n "$BACKUP_SHA" ] || { echo "FATAL: Missing backup_sha"; exit 1; }

          HEAD_SIZE=$(aws s3api head-object --bucket "$S3_BUCKET" --key "$BACKUP_KEY" --query 'ContentLength' --output text)
          if [ "$BACKUP_SIZE" != "0" ] && [ "$HEAD_SIZE" != "$BACKUP_SIZE" ]; then
            echo "FATAL: head-object size mismatch: expected $BACKUP_SIZE got $HEAD_SIZE"
            exit 1
          fi

          aws s3 cp "s3://$S3_BUCKET/$BACKUP_KEY" "$TMP_BACKUP"
          ACTUAL_SHA=$(sha256sum "$TMP_BACKUP" | awk '{print $1}')
          rm -f "$TMP_BACKUP"

          if [ "$ACTUAL_SHA" != "$BACKUP_SHA" ]; then
            echo "FATAL: encrypted artifact SHA-256 mismatch"
            echo "expected=$BACKUP_SHA actual=$ACTUAL_SHA"
            exit 1
          fi

          echo "Encrypted artifact validated: $BACKUP_KEY"

      # ── Step 6: Publish restore manifest for the new instance ──
      - name: Publish restore manifest
        run: |
          NEW_INSTANCE="${{ steps.launch.outputs.new_instance }}"
          S3_BUCKET="${{ steps.infra.outputs.s3_bucket }}"
          BACKUP_KEY="${{ steps.backup.outputs.backup_key }}"
          BACKUP_SOURCE="${{ steps.backup.outputs.backup_source }}"

          if [ "$BACKUP_SOURCE" = "seed_dump" ]; then
            cat <<EOF | aws s3 cp - "s3://$S3_BUCKET/deploy/restore-$NEW_INSTANCE.json"
            {"deploy_id":"${{ github.run_id }}","backup_key":"none","restore_type":"seed_only","timestamp":"$(date -u +%Y-%m-%dT%H:%M:%SZ)"}
          EOF
            echo "Seed-only restore manifest published for $NEW_INSTANCE"
          else
            if [ -z "$BACKUP_KEY" ]; then
              echo "FATAL: Missing backup_key for restore manifest"
              exit 1
            fi

            cat <<EOF | aws s3 cp - "s3://$S3_BUCKET/deploy/restore-$NEW_INSTANCE.json"
            {"deploy_id":"${{ github.run_id }}","backup_key":"$BACKUP_KEY","restore_type":"full","timestamp":"$(date -u +%Y-%m-%dT%H:%M:%SZ)"}
          EOF
            echo "Restore manifest published for $NEW_INSTANCE"
          fi

      # ── Step 7: Wait for new enclave to restore, verify, become healthy ──
      - name: Wait for enclave health
        id: health
        run: |
          NEW_INSTANCE="${{ steps.launch.outputs.new_instance }}"
          OLD_INSTANCE="${{ steps.infra.outputs.old_instance }}"
          S3_BUCKET="${{ steps.infra.outputs.s3_bucket }}"

          echo "Waiting for enclave health on $NEW_INSTANCE..."
          for i in $(seq 1 120); do
            VERIFY=$(aws s3 cp "s3://$S3_BUCKET/deploy/verify-$NEW_INSTANCE.json" - 2>/dev/null || echo "")
            if [ -n "$VERIFY" ]; then
              echo "$VERIFY" | jq .
              STATUS=$(echo "$VERIFY" | jq -r '.status // "UNKNOWN"')
              RESTORE_TYPE=$(echo "$VERIFY" | jq -r '.restore_type // "unknown"')
              USER_COUNT=$(echo "$VERIFY" | jq -r '.user_count // 0')

              echo "## Health: $STATUS | restore: $RESTORE_TYPE | users: $USER_COUNT" >> $GITHUB_STEP_SUMMARY

              if [ "$STATUS" != "HEALTHY" ]; then
                echo "FATAL: Enclave not healthy: $STATUS"
                echo "Details: $(echo "$VERIFY" | jq -r '.details // .failed_checks // "none"')"
                exit 1
              fi
              if [ -n "$OLD_INSTANCE" ] && [ "${{ steps.backup.outputs.backup_source }}" != "seed_dump" ]; then
                if [ "$RESTORE_TYPE" = "fresh_start" ]; then
                  echo "FATAL: New enclave started fresh but old had data"; exit 1
                fi
                echo "Data migration verified: $USER_COUNT users"
              fi
              # Verify cloudflared is confirmed running (included in HEALTHY check)
              CF_CHECK=$(echo "$VERIFY" | jq -r '.checks.cloudflared // "missing"')
              if [ "$CF_CHECK" != "true" ]; then
                echo "FATAL: Cloudflared not confirmed running in verify result"
                exit 1
              fi
              echo "healthy=true" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "Waiting ($i/120)..."
            sleep 10
          done
          echo "FATAL: Health check timed out after 20 minutes"; exit 1

      # ── Step 8: Switch traffic to new instance ──
      # New enclave is healthy and serving via its own cloudflared.
      # Now stop old cloudflared so Cloudflare routes all traffic to new,
      # then terminate old instance.
      - name: Switch to new instance
        if: steps.health.outputs.healthy == 'true'
        env:
          AWS_DEFAULT_REGION: us-east-1
        run: |
          NEW_INSTANCE="${{ steps.launch.outputs.new_instance }}"
          OLD_INSTANCE="${{ steps.infra.outputs.old_instance }}"
          S3_BUCKET="${{ steps.infra.outputs.s3_bucket }}"

          # Enable maintenance mode on old instance to stop cloudflared and block writes
          if [ -n "$OLD_INSTANCE" ] && [ "$OLD_INSTANCE" != "$NEW_INSTANCE" ]; then
            echo "Enabling maintenance mode on old instance to stop cloudflared..."
            MAINT_CMD=$(aws ssm send-command \
              --instance-ids "$OLD_INSTANCE" \
              --document-name "AWS-RunShellScript" \
              --parameters '{"commands":["/opt/lightfriend/trigger-maintenance.sh enable"]}' \
              --timeout-seconds 30 \
              --query "Command.CommandId" --output text 2>/dev/null || echo "")
            if [ -n "$MAINT_CMD" ]; then
              for i in $(seq 1 6); do
                MAINT_STATUS=$(aws ssm get-command-invocation --command-id "$MAINT_CMD" --instance-id "$OLD_INSTANCE" \
                  --query "Status" --output text 2>/dev/null || echo "Pending")
                case "$MAINT_STATUS" in
                  Success) echo "Old instance maintenance mode enabled"; break ;;
                  Failed|TimedOut|Cancelled) echo "WARNING: Maintenance enable $MAINT_STATUS (non-fatal, terminating anyway)"; break ;;
                esac
                sleep 5
              done
            fi
          fi

          aws ssm put-parameter --name /lightfriend/instance-id \
            --value "$NEW_INSTANCE" --type String --overwrite
          echo "SSM updated to $NEW_INSTANCE"

          # Brief grace period then terminate old
          sleep 15
          if [ -n "$OLD_INSTANCE" ] && [ "$OLD_INSTANCE" != "$NEW_INSTANCE" ]; then
            aws ec2 terminate-instances --instance-ids "$OLD_INSTANCE" 2>/dev/null || echo "WARNING: Could not terminate old instance $OLD_INSTANCE (may already be gone)"
            echo "Old instance $OLD_INSTANCE terminated"
          fi

          echo '{"github_run_id":"${{ github.run_id }}","old_instance":"'$OLD_INSTANCE'","new_instance":"'$NEW_INSTANCE'","state":"complete","completed_at":"'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"}' | \
            aws s3 cp - "s3://$S3_BUCKET/deploy/deploy-state.json"

          cat <<EOF | aws s3 cp - "s3://$S3_BUCKET/deploy/logs/deploy-${{ github.run_id }}.json"
          {"deploy_id":"${{ github.run_id }}","commit_sha":"${{ github.sha }}","completed_at":"$(date -u +%Y-%m-%dT%H:%M:%SZ)","outcome":"SUCCESS","old_instance":"$OLD_INSTANCE","new_instance":"$NEW_INSTANCE","eif_key":"${{ needs.build-eif.outputs.eif_key }}","eif_sha256":"${{ needs.build-eif.outputs.eif_sha256 }}","pcr0":"${{ needs.build-eif.outputs.pcr0 }}","pcr1":"${{ needs.build-eif.outputs.pcr1 }}","pcr2":"${{ needs.build-eif.outputs.pcr2 }}"}
          EOF

          aws s3 rm "s3://$S3_BUCKET/deploy/verify-$NEW_INSTANCE.json" 2>/dev/null || true
          aws s3 rm "s3://$S3_BUCKET/deploy/pre-warm-$NEW_INSTANCE.json" 2>/dev/null || true
          aws s3 rm "s3://$S3_BUCKET/deploy/eif-$NEW_INSTANCE.json" 2>/dev/null || true
          aws s3 rm "s3://$S3_BUCKET/deploy/restore-$NEW_INSTANCE.json" 2>/dev/null || true

          echo "## Deploy Complete" >> $GITHUB_STEP_SUMMARY

      # ── Rollback: terminate new instance, old stays live ──
      # Triggers on failure AND cancellation to prevent orphaned EC2 instances
      - name: Rollback on failure
        if: (failure() || cancelled()) && steps.launch.outputs.new_instance != ''
        env:
          AWS_DEFAULT_REGION: us-east-1
          CONTRACT_ADDRESS: ${{ secrets.MARLIN_KMS_CONTRACT_ADDRESS }}
          RPC_URL: ${{ secrets.ARBITRUM_RPC_URL }}
          PRIVATE_KEY: ${{ secrets.ARBITRUM_PRIVATE_KEY }}
        run: |
          NEW_INSTANCE="${{ steps.launch.outputs.new_instance }}"
          OLD_INSTANCE="${{ steps.infra.outputs.old_instance }}"
          S3_BUCKET="${{ steps.infra.outputs.s3_bucket }}"
          PCR0="${{ needs.build-eif.outputs.pcr0 }}"

          echo "ROLLING BACK: terminating new instance $NEW_INSTANCE"
          echo "Old instance $OLD_INSTANCE was never put in maintenance mode - still serving traffic"

          # Restore SSM to old instance
          if [ -n "$OLD_INSTANCE" ]; then
            aws ssm put-parameter --name /lightfriend/instance-id \
              --value "$OLD_INSTANCE" --type String --overwrite 2>/dev/null || true
          fi

          aws ec2 terminate-instances --instance-ids "$NEW_INSTANCE" 2>/dev/null || true

          if [ -n "$CONTRACT_ADDRESS" ] && [ -n "$RPC_URL" ] && [ -n "$PRIVATE_KEY" ] && [ -n "$PCR0" ]; then
            echo "Revoking failed image approval for PCR0 $PCR0"
            cast send "$CONTRACT_ADDRESS" "revokeImage(bytes32)" "$PCR0" \
              --rpc-url "$RPC_URL" \
              --private-key "$PRIVATE_KEY" 2>/dev/null || true
          fi

          cat <<EOF | aws s3 cp - "s3://$S3_BUCKET/deploy/logs/deploy-${{ github.run_id }}.json"
          {"deploy_id":"${{ github.run_id }}","commit_sha":"${{ github.sha }}","completed_at":"$(date -u +%Y-%m-%dT%H:%M:%SZ)","outcome":"ROLLBACK","old_instance":"$OLD_INSTANCE","new_instance":"$NEW_INSTANCE","eif_key":"${{ needs.build-eif.outputs.eif_key }}","eif_sha256":"${{ needs.build-eif.outputs.eif_sha256 }}","pcr0":"${{ needs.build-eif.outputs.pcr0 }}","pcr1":"${{ needs.build-eif.outputs.pcr1 }}","pcr2":"${{ needs.build-eif.outputs.pcr2 }}"}
          EOF

          # Clean up ALL S3 deploy signals (prevents stale results blocking future deploys)
          aws s3 rm "s3://$S3_BUCKET/deploy/verify-$NEW_INSTANCE.json" 2>/dev/null || true
          aws s3 rm "s3://$S3_BUCKET/deploy/pre-warm-$NEW_INSTANCE.json" 2>/dev/null || true
          aws s3 rm "s3://$S3_BUCKET/deploy/eif-$NEW_INSTANCE.json" 2>/dev/null || true
          aws s3 rm "s3://$S3_BUCKET/deploy/restore-$NEW_INSTANCE.json" 2>/dev/null || true
          aws s3 rm "s3://$S3_BUCKET/deploy/export-complete.json" 2>/dev/null || true
          aws s3 rm "s3://$S3_BUCKET/deploy/export-request.json" 2>/dev/null || true

          echo "## ROLLBACK - old instance $OLD_INSTANCE restored" >> $GITHUB_STEP_SUMMARY

  notify:
    needs: [deploy]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Send email notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: mail.privateemail.com
          server_port: 465
          secure: true
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          to: ${{ secrets.SMTP_USERNAME }}
          from: Lightfriend CI <${{ secrets.SMTP_USERNAME }}>
          subject: "${{ needs.deploy.result == 'success' && 'Deploy SUCCESS' || 'Deploy FAILED' }} - ${{ github.sha }}"
          body: |
            Deploy ${{ needs.deploy.result }} for commit ${{ github.sha }}

            Branch: ${{ github.ref_name }}
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
