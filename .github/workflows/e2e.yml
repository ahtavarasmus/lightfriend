name: E2E Tests

on:
  pull_request:
    branches: ["*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  e2e-tests:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: lightfriend
          POSTGRES_PASSWORD: test
          POSTGRES_DB: lightfriend_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
          cache-on-failure: true

      - name: Run E2E tests
        working-directory: backend
        env:
          TEST_PG_DATABASE_URL: postgres://lightfriend:test@localhost:5432/lightfriend_test
        run: cargo test --test sms_e2e
