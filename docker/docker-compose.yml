services:
  # PostgreSQL database for Synapse and bridges
  postgres:
    image: postgres:16-alpine
    container_name: lightfriend-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_MULTIPLE_DATABASES: synapse_db,whatsapp_db,signal_db,messenger_db,instagram_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    networks:
      - lightfriend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Synapse Matrix homeserver
  synapse:
    image: matrixdotorg/synapse:latest
    container_name: lightfriend-synapse
    user: "0:0"  # Start as root to fix permissions, then run as synapse
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    environment:
      SYNAPSE_SERVER_NAME: matrix.local
      SYNAPSE_REPORT_STATS: "no"
      POSTGRES_USER: synapse_user
      POSTGRES_PASSWORD: ${SYNAPSE_DB_PASSWORD:-synapse_password}
      POSTGRES_DB: synapse_db
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
    volumes:
      - synapse_data:/data
      - ./synapse:/config:ro
      - ./synapse/docker-entrypoint.sh:/entrypoint.sh:ro
      - ./bridges:/bridges:ro
    ports:
      - "8008:8008"
    networks:
      - lightfriend
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8008/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Signald (required for Signal bridge)
  signald:
    image: docker.io/signald/signald:latest
    container_name: lightfriend-signald
    volumes:
      - signald_data:/signald
    networks:
      - lightfriend
    healthcheck:
      test: ["CMD-SHELL", "test -S /signald/signald.sock"]
      interval: 10s
      timeout: 5s
      retries: 3

  # WhatsApp bridge
  mautrix-whatsapp:
    image: dock.mau.dev/mautrix/whatsapp:latest
    container_name: lightfriend-whatsapp
    volumes:
      - whatsapp_data:/data
      - ./bridges/whatsapp/config.yaml:/data/config.yaml
    networks:
      - lightfriend
    depends_on:
      postgres:
        condition: service_healthy
      synapse:
        condition: service_healthy
    restart: unless-stopped

  # Signal bridge
  mautrix-signal:
    image: dock.mau.dev/mautrix/signal:latest
    container_name: lightfriend-signal
    volumes:
      - signal_data:/data
      - ./bridges/signal/config.yaml:/data/config.yaml
      - signald_data:/signald
    networks:
      - lightfriend
    depends_on:
      postgres:
        condition: service_healthy
      synapse:
        condition: service_healthy
      signald:
        condition: service_healthy
    restart: unless-stopped

  # Messenger bridge (mautrix-meta)
  mautrix-messenger:
    image: dock.mau.dev/mautrix/meta:latest
    container_name: lightfriend-messenger
    volumes:
      - messenger_data:/data
      - ./bridges/messenger/config.yaml:/data/config.yaml
    networks:
      - lightfriend
    depends_on:
      postgres:
        condition: service_healthy
      synapse:
        condition: service_healthy
    restart: unless-stopped

  # Instagram bridge (mautrix-meta)
  mautrix-instagram:
    image: dock.mau.dev/mautrix/meta:latest
    container_name: lightfriend-instagram
    volumes:
      - instagram_data:/data
      - ./bridges/instagram/config.yaml:/data/config.yaml
    networks:
      - lightfriend
    depends_on:
      postgres:
        condition: service_healthy
      synapse:
        condition: service_healthy
    restart: unless-stopped

  # Lightfriend Core (Rust backend + frontend)
  core:
    image: lightfriend-core  # Using pre-built image (built with: just build-prebuilt)
    pull_policy: never  # Always use local image, never pull from registry
    # build:
    #   context: ..
    #   dockerfile: docker/core/Dockerfile
    container_name: lightfriend-core
    environment:
      DATABASE_URL: /app/data/database.db
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_REFRESH_KEY: ${JWT_REFRESH_KEY}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      MATRIX_HOMESERVER: http://synapse:8008
      MATRIX_HOMESERVER_SHARED_SECRET: ${MATRIX_HOMESERVER_SHARED_SECRET}
      MATRIX_HOMESERVER_PERSISTENT_STORE_PATH: /app/matrix_store
      WHATSAPP_BRIDGE_BOT: "@whatsappbot:matrix.local"
      SIGNAL_BRIDGE_BOT: "@signalbot:matrix.local"
      MESSENGER_BRIDGE_BOT: "@messengerbot:matrix.local"
      INSTAGRAM_BRIDGE_BOT: "@igbot:matrix.local"
      GOOGLE_CALENDAR_CLIENT_ID: ${GOOGLE_CALENDAR_CLIENT_ID:-}
      GOOGLE_CALENDAR_CLIENT_SECRET: ${GOOGLE_CALENDAR_CLIENT_SECRET:-}
      GOOGLE_TASKS_CLIENT_ID: ${GOOGLE_TASKS_CLIENT_ID:-}
      GOOGLE_TASKS_CLIENT_SECRET: ${GOOGLE_TASKS_CLIENT_SECRET:-}
      ELEVENLABS_SERVER_URL_SECRET: ${ELEVENLABS_SERVER_URL_SECRET:-}
      ELEVENLABS_WEBHOOK_SECRET: ${ELEVENLABS_WEBHOOK_SECRET:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      PERPLEXITY_API_KEY: ${PERPLEXITY_API_KEY:-}
      FRONTEND_URL: http://localhost:8080
      PORT: 3000
      ENVIRONMENT: ${ENVIRONMENT:-development}
      SENTRY_DSN: ${SENTRY_DSN:-}
    volumes:
      - core_data:/app/data
      - core_uploads:/app/uploads
      - core_matrix_store:/app/matrix_store
    ports:
      - "3000:3000"
    networks:
      - lightfriend
    depends_on:
      synapse:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3

networks:
  lightfriend:
    driver: bridge

volumes:
  postgres_data:
  synapse_data:
  signald_data:
  whatsapp_data:
  signal_data:
  messenger_data:
  instagram_data:
  core_data:
  core_uploads:
  core_matrix_store:
