services:
  # PostgreSQL database for bridges
  postgres:
    image: postgres:16-alpine
    container_name: lightfriend-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_MULTIPLE_DATABASES: whatsapp_db,signal_db,telegram_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    networks:
      - lightfriend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Tuwunel Matrix homeserver (Rust, uses built-in RocksDB)
  tuwunel:
    image: jevolk/tuwunel:latest
    container_name: lightfriend-tuwunel
    environment:
      TUWUNEL_CONFIG: /etc/tuwunel/tuwunel.toml
    volumes:
      - tuwunel_data:/var/lib/tuwunel
      - ./tuwunel/tuwunel.toml:/etc/tuwunel/tuwunel.toml:ro
    ports:
      - "8008:8008"
    networks:
      - lightfriend
    restart: unless-stopped

  # WhatsApp bridge
  mautrix-whatsapp:
    image: dock.mau.dev/mautrix/whatsapp:latest
    container_name: lightfriend-whatsapp
    volumes:
      - whatsapp_data:/data
      - ./bridges/whatsapp/config.yaml:/data/config.yaml
    networks:
      - lightfriend
    depends_on:
      postgres:
        condition: service_healthy
      tuwunel:
        condition: service_started
    restart: unless-stopped

  # Signal bridge
  mautrix-signal:
    image: dock.mau.dev/mautrix/signal:latest
    container_name: lightfriend-signal
    volumes:
      - signal_data:/data
      - ./bridges/signal/config.yaml:/data/config.yaml
    networks:
      - lightfriend
    depends_on:
      postgres:
        condition: service_healthy
      tuwunel:
        condition: service_started
    restart: unless-stopped

  # Telegram bridge
  mautrix-telegram:
    image: dock.mau.dev/mautrix/telegram:latest
    container_name: lightfriend-telegram
    volumes:
      - telegram_data:/data
      - ./bridges/telegram/config.yaml:/data/config.yaml
    networks:
      - lightfriend
    depends_on:
      postgres:
        condition: service_healthy
      tuwunel:
        condition: service_started
    restart: unless-stopped

  # Lightfriend Core (Rust backend + frontend)
  core:
    image: ahtavarasmus/lightfriend-core:latest
    container_name: lightfriend-core
    environment:
      DATABASE_URL: /app/data/database.db
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_REFRESH_KEY: ${JWT_REFRESH_KEY}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_CREDITS_PRODUCT_ID: ${STRIPE_CREDITS_PRODUCT_ID:-}
      STRIPE_SUBSCRIPTION_WORLD_PRICE_ID: ${STRIPE_SUBSCRIPTION_WORLD_PRICE_ID:-}
      STRIPE_SUBSCRIPTION_HOSTED_PLAN_PRICE_ID_US: ${STRIPE_SUBSCRIPTION_HOSTED_PLAN_PRICE_ID_US:-}
      STRIPE_SUBSCRIPTION_SELF_HOSTING_PRICE_ID: ${STRIPE_SUBSCRIPTION_SELF_HOSTING_PRICE_ID:-}
      STRIPE_SUBSCRIPTION_SENTINEL_PRICE_ID_FI: ${STRIPE_SUBSCRIPTION_SENTINEL_PRICE_ID_FI:-}
      STRIPE_SUBSCRIPTION_SENTINEL_PRICE_ID_NL: ${STRIPE_SUBSCRIPTION_SENTINEL_PRICE_ID_NL:-}
      STRIPE_SUBSCRIPTION_SENTINEL_PRICE_ID_UK: ${STRIPE_SUBSCRIPTION_SENTINEL_PRICE_ID_UK:-}
      STRIPE_SUBSCRIPTION_SENTINEL_PRICE_ID_AU: ${STRIPE_SUBSCRIPTION_SENTINEL_PRICE_ID_AU:-}
      STRIPE_SUBSCRIPTION_SENTINEL_PRICE_ID_OTHER: ${STRIPE_SUBSCRIPTION_SENTINEL_PRICE_ID_OTHER:-}
      STRIPE_ASSISTANT_PLAN_PRICE_ID: ${STRIPE_ASSISTANT_PLAN_PRICE_ID:-}
      STRIPE_ASSISTANT_PLAN_PRICE_ID_US: ${STRIPE_ASSISTANT_PLAN_PRICE_ID_US:-}
      STRIPE_AUTOPILOT_PLAN_PRICE_ID: ${STRIPE_AUTOPILOT_PLAN_PRICE_ID:-}
      STRIPE_AUTOPILOT_PLAN_PRICE_ID_US: ${STRIPE_AUTOPILOT_PLAN_PRICE_ID_US:-}
      STRIPE_BYOT_PLAN_PRICE_ID: ${STRIPE_BYOT_PLAN_PRICE_ID:-}
      MATRIX_HOMESERVER: http://tuwunel:8008
      MATRIX_SHARED_SECRET: ${MATRIX_HOMESERVER_SHARED_SECRET}
      MATRIX_REGISTRATION_TOKEN: ${MATRIX_REGISTRATION_TOKEN}
      MATRIX_HOMESERVER_PERSISTENT_STORE_PATH: /app/matrix_store
      WHATSAPP_BRIDGE_BOT: "@whatsappbot:localhost"
      SIGNAL_BRIDGE_BOT: "@signalbot:localhost"
      TELEGRAM_BRIDGE_BOT: "@telegrambot:localhost"
      ELEVENLABS_SERVER_URL_SECRET: ${ELEVENLABS_SERVER_URL_SECRET:-}
      ELEVENLABS_WEBHOOK_SECRET: ${ELEVENLABS_WEBHOOK_SECRET:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      TINFOIL_API_KEY: ${TINFOIL_API_KEY:-}
      PERPLEXITY_API_KEY: ${PERPLEXITY_API_KEY:-}
      # Resend API for notification emails (optional)
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-notifications@lightfriend.ai}
      # Admin emails - REQUIRED (comma-separated list)
      ADMIN_EMAILS: ${ADMIN_EMAILS}
      # Bootstrap (only used if database is empty, uses first email from ADMIN_EMAILS)
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-12345678}
      BOOTSTRAP_ADMIN_PHONE: ${BOOTSTRAP_ADMIN_PHONE:-+12345678}
      FRONTEND_URL: http://localhost:8080
      PORT: 3000
      ENVIRONMENT: ${ENVIRONMENT:-development}
      SENTRY_DSN: ${SENTRY_DSN:-}
      # VSOCK proxy (only for Nitro Enclave deployment, leave empty for normal mode)
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
    volumes:
      - core_data:/app/data
      - core_uploads:/app/uploads
      - core_matrix_store:/app/matrix_store
    ports:
      - "3000:3000"
    networks:
      - lightfriend
    depends_on:
      tuwunel:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3

networks:
  lightfriend:
    driver: bridge

volumes:
  postgres_data:
  tuwunel_data:
  whatsapp_data:
  signal_data:
  telegram_data:
  core_data:
  core_uploads:
  core_matrix_store:
