<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voice Pipeline Test</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, system-ui, sans-serif; background: #111; color: #eee; padding: 2rem; max-width: 640px; margin: 0 auto; }
  h1 { font-size: 1.4rem; margin-bottom: 1rem; }
  .controls { display: flex; gap: 1rem; margin-bottom: 1.5rem; align-items: center; }
  input { background: #222; border: 1px solid #444; color: #eee; padding: 0.5rem; border-radius: 4px; width: 100px; font-size: 1rem; }
  button { padding: 0.6rem 1.4rem; border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; transition: background 0.15s; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  #startBtn { background: #2a5; color: #fff; }
  #startBtn:hover:not(:disabled) { background: #3b6; }
  #stopBtn { background: #a33; color: #fff; }
  #stopBtn:hover:not(:disabled) { background: #c44; }
  .status { margin-bottom: 1rem; }
  .indicator { display: inline-block; width: 12px; height: 12px; border-radius: 50%; margin-right: 0.5rem; vertical-align: middle; }
  .indicator.off { background: #555; }
  .indicator.listening { background: #2a5; }
  .indicator.speaking { background: #e93; }
  .indicator.processing { background: #48f; }
  #log { background: #1a1a1a; border: 1px solid #333; border-radius: 6px; padding: 1rem; height: 400px; overflow-y: auto; font-family: 'SF Mono', Monaco, monospace; font-size: 0.8rem; line-height: 1.5; }
  .log-entry { padding: 2px 0; }
  .log-entry.error { color: #f66; }
  .log-entry.info { color: #8cf; }
  .log-entry.speech { color: #6e6; }
  .log-entry.audio { color: #fc6; }
  .rms-bar { height: 4px; background: #333; border-radius: 2px; margin-bottom: 1rem; overflow: hidden; }
  .rms-fill { height: 100%; background: #2a5; transition: width 50ms; width: 0%; }
</style>
</head>
<body>
<h1>Voice Pipeline Debug</h1>
<div class="controls">
  <label>User ID: <input type="number" id="userId" value="1"></label>
  <button id="startBtn">Start</button>
  <button id="stopBtn" disabled>Stop</button>
</div>
<div class="status">
  <span class="indicator off" id="statusDot"></span>
  <span id="statusText">Disconnected</span>
</div>
<div class="rms-bar"><div class="rms-fill" id="rmsFill"></div></div>
<div id="log"></div>

<script>
const log = document.getElementById('log');
const startBtn = document.getElementById('startBtn');
const stopBtn = document.getElementById('stopBtn');
const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');
const rmsFill = document.getElementById('rmsFill');
const userIdInput = document.getElementById('userId');

let ws = null;
let audioCtx = null;
let micStream = null;
let scriptNode = null;
let playbackQueue = [];
let isPlaying = false;
let currentSampleRate = 24000;

function addLog(msg, cls = '') {
  const el = document.createElement('div');
  el.className = 'log-entry ' + cls;
  const ts = new Date().toLocaleTimeString('en-US', {hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit'});
  el.textContent = `[${ts}] ${msg}`;
  log.appendChild(el);
  log.scrollTop = log.scrollHeight;
}

function setStatus(state, text) {
  statusDot.className = 'indicator ' + state;
  statusText.textContent = text;
}

function computeRMS(samples) {
  let sum = 0;
  for (let i = 0; i < samples.length; i++) sum += samples[i] * samples[i];
  return Math.sqrt(sum / samples.length);
}

async function start() {
  const userId = parseInt(userIdInput.value);
  if (!userId || userId <= 0) { addLog('Invalid user ID', 'error'); return; }

  startBtn.disabled = true;
  addLog('Requesting microphone access...');

  try {
    // Get mic at 16kHz mono
    micStream = await navigator.mediaDevices.getUserMedia({
      audio: { sampleRate: 16000, channelCount: 1, echoCancellation: true, noiseSuppression: true }
    });
  } catch (e) {
    addLog('Mic access denied: ' + e.message, 'error');
    startBtn.disabled = false;
    return;
  }

  audioCtx = new AudioContext({ sampleRate: 16000 });
  const source = audioCtx.createMediaStreamSource(micStream);

  // ScriptProcessorNode to capture PCM chunks (4096 samples = 256ms at 16kHz)
  scriptNode = audioCtx.createScriptProcessor(4096, 1, 1);
  scriptNode.onaudioprocess = (e) => {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    const float32 = e.inputBuffer.getChannelData(0);

    // Convert float32 [-1,1] to int16
    const int16 = new Int16Array(float32.length);
    for (let i = 0; i < float32.length; i++) {
      int16[i] = Math.max(-32768, Math.min(32767, Math.round(float32[i] * 32767)));
    }

    // Compute RMS for visual feedback
    const rms = computeRMS(int16);
    const pct = Math.min(100, (rms / 2000) * 100);
    rmsFill.style.width = pct + '%';
    rmsFill.style.background = rms > 400 ? '#2a5' : '#555';

    // Send as binary
    ws.send(int16.buffer);
  };
  source.connect(scriptNode);
  scriptNode.connect(audioCtx.destination); // needed for onaudioprocess to fire

  // Connect WebSocket
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const wsUrl = `${proto}//${location.host}/api/voice/ws-debug?user_id=${userId}`;
  addLog('Connecting to ' + wsUrl);
  setStatus('off', 'Connecting...');

  ws = new WebSocket(wsUrl);
  ws.binaryType = 'arraybuffer';

  ws.onopen = () => {
    addLog('WebSocket connected', 'info');
    setStatus('listening', 'Listening');
    stopBtn.disabled = false;
  };

  ws.onmessage = (evt) => {
    if (typeof evt.data === 'string') {
      const msg = JSON.parse(evt.data);
      switch (msg.type) {
        case 'ready':
          addLog('Session ready for user ' + msg.user_id, 'info');
          break;
        case 'vad':
          if (msg.speaking) {
            addLog('Speech detected', 'speech');
            setStatus('speaking', 'You are speaking...');
          } else if (msg.processing) {
            addLog('Processing speech (' + msg.speech_ms + 'ms)', 'info');
            setStatus('processing', 'Processing...');
          }
          break;
        case 'audio_start':
          currentSampleRate = msg.sample_rate || 24000;
          addLog('Receiving audio: ' + msg.samples + ' samples @ ' + currentSampleRate + 'Hz', 'audio');
          playbackQueue = [];
          break;
        case 'audio_end':
          addLog('Audio received, playing back', 'audio');
          playAudio();
          break;
        case 'error':
          addLog('Server error: ' + msg.message, 'error');
          setStatus('listening', 'Listening');
          break;
        case 'pong':
          break;
        default:
          addLog('Server: ' + JSON.stringify(msg));
      }
    } else {
      // Binary: PCM i16 audio data
      const int16 = new Int16Array(evt.data);
      playbackQueue.push(int16);
    }
  };

  ws.onclose = () => {
    addLog('WebSocket closed', 'info');
    setStatus('off', 'Disconnected');
    cleanup();
  };

  ws.onerror = (e) => {
    addLog('WebSocket error', 'error');
  };
}

function playAudio() {
  if (playbackQueue.length === 0) {
    setStatus('listening', 'Listening');
    return;
  }

  setStatus('speaking', 'Assistant speaking...');

  // Merge all chunks
  let totalLen = 0;
  for (const chunk of playbackQueue) totalLen += chunk.length;
  const merged = new Float32Array(totalLen);
  let offset = 0;
  for (const chunk of playbackQueue) {
    for (let i = 0; i < chunk.length; i++) {
      merged[offset++] = chunk[i] / 32768.0;
    }
  }
  playbackQueue = [];

  // Create playback context at TTS sample rate
  const playCtx = new AudioContext({ sampleRate: currentSampleRate });
  const buf = playCtx.createBuffer(1, merged.length, currentSampleRate);
  buf.getChannelData(0).set(merged);

  const src = playCtx.createBufferSource();
  src.buffer = buf;
  src.connect(playCtx.destination);
  src.onended = () => {
    playCtx.close();
    setStatus('listening', 'Listening');
    addLog('Playback complete', 'audio');
  };
  src.start();
}

function stop() {
  if (ws) { ws.close(); ws = null; }
  cleanup();
}

function cleanup() {
  if (scriptNode) { scriptNode.disconnect(); scriptNode = null; }
  if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
  if (audioCtx) { audioCtx.close(); audioCtx = null; }
  startBtn.disabled = false;
  stopBtn.disabled = true;
  rmsFill.style.width = '0%';
}

startBtn.onclick = start;
stopBtn.onclick = stop;
</script>
</body>
</html>
