# Cargo build configuration for faster compilation
#
# NOTE: mold linker is configured via RUSTFLAGS in Docker only (see Dockerfile)
# This allows native builds on servers without mold installed

[target.aarch64-apple-darwin]
# rpaths for keg-only Homebrew formulas (not symlinked into /opt/homebrew/lib).
# If a boot fails with `Library not loaded: @rpath/libX.dylib`, find where
# brew put it with `brew --prefix <formula>` and add the `/lib` subdir here.
# These are macOS-only and don't affect Linux/Docker builds.
rustflags = [
    "-C", "link-arg=-Wl,-rpath,/opt/homebrew/lib",
    "-C", "link-arg=-Wl,-rpath,/opt/homebrew/opt/openssl@3/lib",
    "-C", "link-arg=-Wl,-rpath,/opt/homebrew/opt/sqlite/lib",
    "-C", "link-arg=-Wl,-rpath,/opt/homebrew/opt/libiconv/lib",
    "-C", "link-arg=-Wl,-rpath,/opt/homebrew/lib/postgresql@14",
]

[build]
# Use all available CPU cores for parallel compilation (default behavior)

[profile.release]
# Optimize for speed while keeping reasonable build times
opt-level = 3           # Full optimizations
lto = "thin"           # Thin LTO for faster linking than "fat" LTO
codegen-units = 16     # Parallel codegen (more = faster compile, slightly slower runtime)
strip = true           # Strip symbols for smaller binary
panic = "abort"        # Smaller binary, no unwinding overhead

[profile.release-fast]
# Alternative profile for FASTER builds (use with: cargo build --profile release-fast)
inherits = "release"
opt-level = 2          # Slightly less optimization
lto = false            # No LTO for faster linking
codegen-units = 256    # Maximum parallelism

[net]
# Use sparse registry protocol for faster dependency fetching
git-fetch-with-cli = false
