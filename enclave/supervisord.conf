[unix_http_server]
file=/var/run/supervisor.sock

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
childlogdir=/var/log/supervisor

# ── PostgreSQL ──────────────────────────────────────────────────────────────
[program:postgresql]
command=/usr/lib/postgresql/15/bin/postgres -D /var/lib/postgresql/data -c config_file=/var/lib/postgresql/data/postgresql.conf
user=postgres
autostart=true
autorestart=true
priority=10
stdout_logfile=/var/log/supervisor/postgresql.log
stderr_logfile=/var/log/supervisor/postgresql-err.log

# ── Tuwunel (Matrix homeserver) ─────────────────────────────────────────────
[program:tuwunel]
command=/usr/local/bin/tuwunel
environment=TUWUNEL_CONFIG="/etc/tuwunel/tuwunel.toml"
autostart=true
autorestart=true
startsecs=0
startretries=999
priority=20
stdout_logfile=/var/log/supervisor/tuwunel.log
stderr_logfile=/var/log/supervisor/tuwunel-err.log

# ── mautrix-whatsapp ───────────────────────────────────────────────────────
[program:mautrix-whatsapp]
command=/usr/local/bin/mautrix-whatsapp -c /data/bridges/whatsapp/config.yaml
autostart=true
autorestart=true
startsecs=0
startretries=999
priority=30
stdout_logfile=/var/log/supervisor/whatsapp.log
stderr_logfile=/var/log/supervisor/whatsapp-err.log

# ── mautrix-signal ─────────────────────────────────────────────────────────
[program:mautrix-signal]
command=/usr/local/bin/mautrix-signal -c /data/bridges/signal/config.yaml
autostart=true
autorestart=true
startsecs=0
startretries=999
priority=30
stdout_logfile=/var/log/supervisor/signal.log
stderr_logfile=/var/log/supervisor/signal-err.log

# ── mautrix-telegram ──────────────────────────────────────────────────────
[program:mautrix-telegram]
command=/opt/mautrix-telegram-venv/bin/python -m mautrix_telegram -c /data/bridges/telegram/config.yaml
autostart=true
autorestart=true
startsecs=0
startretries=999
priority=30
stdout_logfile=/var/log/supervisor/telegram.log
stderr_logfile=/var/log/supervisor/telegram-err.log

# ── Lightfriend backend ───────────────────────────────────────────────────
[program:lightfriend]
command=/app/backend
directory=/app
autostart=true
autorestart=true
startsecs=0
startretries=999
priority=40
stdout_logfile=/var/log/supervisor/lightfriend.log
stderr_logfile=/var/log/supervisor/lightfriend-err.log

# ── Export watcher (polls host HTTP for export requests) ─────────────────
# Primary export mechanism: polls seed HTTP server for export-request.json,
# runs export.sh, uploads completion marker via HTTP PUT. Replaces VSOCK
# trigger which was unreliable for long-running exports.
[program:export-watcher]
command=/app/export-watcher.sh
autostart=true
autorestart=true
priority=45
stdout_logfile=/var/log/supervisor/export-watcher.log
stderr_logfile=/var/log/supervisor/export-watcher-err.log

# ── Export trigger (VSOCK port 9003) - LEGACY ────────────────────────────
# Kept for backward compatibility. Prefer export-watcher above.
[program:export-trigger]
command=/bin/bash -c "while true; do socat VSOCK-LISTEN:9003,reuseaddr EXEC:'/app/export.sh',nofork 2>/dev/null; done"
autostart=true
autorestart=true
priority=46
stdout_logfile=/var/log/supervisor/export-trigger.log
stderr_logfile=/var/log/supervisor/export-trigger-err.log

# ── Maintenance mode trigger (VSOCK port 9005) ───────────────────────────
[program:maintenance-trigger]
command=/bin/bash -c "while true; do socat VSOCK-LISTEN:9005,reuseaddr EXEC:'/app/enter-maintenance.sh',nofork 2>/dev/null; done"
autostart=true
autorestart=true
priority=46
stdout_logfile=/var/log/supervisor/maintenance-trigger.log
stderr_logfile=/var/log/supervisor/maintenance-trigger-err.log

# ── Service watchdog ─────────────────────────────────────────────────────
[program:service-watchdog]
command=/app/service-watchdog.sh
autostart=true
autorestart=true
priority=5
stdout_logfile=/var/log/supervisor/service-watchdog.log
stderr_logfile=/var/log/supervisor/service-watchdog-err.log

# ── Diagnostic trigger (VSOCK port 9008) ─────────────────────────────────
# Host connects to enclave CID 16 port 9008 to get diagnostic dump.
# Usage from host: socat - VSOCK-CONNECT:16:9008
[program:diag-trigger]
command=/bin/bash -c "while true; do socat VSOCK-LISTEN:9008,reuseaddr EXEC:'/app/diagnose-enclave.sh',nofork 2>/dev/null; done"
autostart=true
autorestart=true
priority=3
stdout_logfile=/var/log/supervisor/diag-trigger.log
stderr_logfile=/var/log/supervisor/diag-trigger-err.log

# ── Cloudflared (Cloudflare tunnel) ──────────────────────────────────────
[program:cloudflared]
command=/usr/local/bin/cloudflared tunnel --protocol http2 --no-autoupdate run --token %(ENV_CLOUDFLARE_TUNNEL_TOKEN)s
environment=HTTP_PROXY="",HTTPS_PROXY="",http_proxy="",https_proxy="",NO_PROXY="*",no_proxy="*"
autostart=true
autorestart=true
startsecs=0
startretries=999
priority=50
stdout_logfile=/var/log/supervisor/cloudflared.log
stderr_logfile=/var/log/supervisor/cloudflared-err.log
