[unix_http_server]
file=/var/run/supervisor.sock

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
childlogdir=/var/log/supervisor

# ── PostgreSQL ──────────────────────────────────────────────────────────────
[program:postgresql]
command=/usr/lib/postgresql/15/bin/postgres -D /var/lib/postgresql/data -c config_file=/var/lib/postgresql/data/postgresql.conf
user=postgres
autostart=true
autorestart=true
priority=10
stdout_logfile=/var/log/supervisor/postgresql.log
stderr_logfile=/var/log/supervisor/postgresql-err.log

# ── Tuwunel (Matrix homeserver) ─────────────────────────────────────────────
[program:tuwunel]
command=/usr/local/bin/tuwunel
environment=TUWUNEL_CONFIG="/etc/tuwunel/tuwunel.toml"
autostart=true
autorestart=true
startsecs=0
startretries=999
priority=20
stdout_logfile=/var/log/supervisor/tuwunel.log
stderr_logfile=/var/log/supervisor/tuwunel-err.log

# ── mautrix-whatsapp ───────────────────────────────────────────────────────
[program:mautrix-whatsapp]
command=/usr/local/bin/mautrix-whatsapp -c /data/bridges/whatsapp/config.yaml
autostart=true
autorestart=true
startsecs=0
startretries=999
priority=30
stdout_logfile=/var/log/supervisor/whatsapp.log
stderr_logfile=/var/log/supervisor/whatsapp-err.log

# ── mautrix-signal ─────────────────────────────────────────────────────────
[program:mautrix-signal]
command=/usr/local/bin/mautrix-signal -c /data/bridges/signal/config.yaml
autostart=true
autorestart=true
startsecs=0
startretries=999
priority=30
stdout_logfile=/var/log/supervisor/signal.log
stderr_logfile=/var/log/supervisor/signal-err.log

# ── mautrix-telegram ──────────────────────────────────────────────────────
[program:mautrix-telegram]
command=/opt/mautrix-telegram-venv/bin/python -m mautrix_telegram -c /data/bridges/telegram/config.yaml
autostart=true
autorestart=true
startsecs=0
startretries=999
priority=30
stdout_logfile=/var/log/supervisor/telegram.log
stderr_logfile=/var/log/supervisor/telegram-err.log

# ── Lightfriend backend ───────────────────────────────────────────────────
[program:lightfriend]
command=/bin/sh -c 'echo "Waiting for tuwunel..."; for i in $(seq 1 60); do if curl -sf --max-time 1 http://localhost:8008/_matrix/client/versions >/dev/null 2>&1; then echo "tuwunel ready after ${i}s"; exec /app/backend; fi; sleep 1; done; echo "tuwunel not ready after 60s, starting anyway"; exec /app/backend'
directory=/app
autostart=true
autorestart=true
startsecs=0
startretries=999
priority=40
stdout_logfile=/var/log/supervisor/lightfriend.log
stderr_logfile=/var/log/supervisor/lightfriend-err.log

# ── Tesla HTTP Proxy (vehicle command signing) ────────────────────────────
# Waits for the backend to generate the Tesla private key, then starts the
# proxy that signs vehicle commands. Listens on localhost:4443 with self-signed TLS.
[program:tesla-http-proxy]
command=/bin/sh -c 'echo "Waiting for Tesla private key..."; for i in $(seq 1 120); do if [ -f /app/tesla_private_key.pem ]; then echo "Tesla key found after ${i}s, starting proxy"; exec /usr/local/bin/tesla-http-proxy -tls-key /etc/tesla-proxy-tls/key.pem -cert /etc/tesla-proxy-tls/cert.pem -key-file /app/tesla_private_key.pem -port 4443 -host 0.0.0.0 -timeout 90s -verbose; fi; sleep 1; done; echo "Tesla private key not found after 120s, proxy disabled"; exit 0'
autostart=true
autorestart=true
startsecs=0
startretries=999
priority=45
stdout_logfile=/var/log/supervisor/tesla-proxy.log
stderr_logfile=/var/log/supervisor/tesla-proxy-err.log

# ── VSOCK bridge for Telegram SOCKS5 residential proxy ──────────────────
# The mautrix-telegram bridge connects to 127.0.0.1:1080, which this socat
# forwards over VSOCK to the host, where another socat forwards to the
# actual residential SOCKS5 proxy. Must be supervisord-managed or it dies
# when exec supervisord replaces the entrypoint shell.
[program:vsock-bridge-telegram-proxy]
command=/usr/bin/socat TCP-LISTEN:1080,reuseaddr,fork,bind=127.0.0.1 VSOCK-CONNECT:3:8500
autostart=true
autorestart=true
priority=4
stdout_logfile=/var/log/supervisor/vsock-telegram-proxy.log
stderr_logfile=/var/log/supervisor/vsock-telegram-proxy-err.log

# ── VSOCK bridges for host HTTP services ─────────────────────────────────
# These MUST be supervisord-managed because background processes from the
# entrypoint die when exec supervisord replaces the shell.
[program:vsock-bridge-9080]
command=/usr/bin/socat TCP-LISTEN:9080,reuseaddr,fork,nodelay VSOCK-CONNECT:3:9080
autostart=true
autorestart=true
priority=4
stdout_logfile=/var/log/supervisor/vsock-9080.log
stderr_logfile=/var/log/supervisor/vsock-9080-err.log

[program:vsock-bridge-9081]
command=/usr/bin/socat TCP-LISTEN:9081,reuseaddr,fork,nodelay VSOCK-CONNECT:3:9081
autostart=true
autorestart=true
priority=4
stdout_logfile=/var/log/supervisor/vsock-9081.log
stderr_logfile=/var/log/supervisor/vsock-9081-err.log

# ── VSOCK bridge for cloudflared edge (port 7844) ────────────────────────
# CRITICAL: This was previously a background process in entrypoint.sh that
# died when exec supervisord replaced the shell. Now managed by supervisord.
# Cloudflared connects to 127.0.0.1:7844 -> this bridge -> VSOCK -> host -> Cloudflare edge
[program:vsock-bridge-7844]
command=/usr/bin/socat -d -d TCP-LISTEN:7844,reuseaddr,fork,nodelay VSOCK-CONNECT:3:7844
autostart=true
autorestart=true
priority=2
stdout_logfile=/var/log/supervisor/vsock-7844.log
stderr_logfile=/var/log/supervisor/vsock-7844-err.log

# ── VSOCK bridge for DNS-over-TLS (853 -> host:8530 -> 1.1.1.1:853) ─────
# Cloudflared uses DoT for SRV record lookups to discover edge servers.
# Was also a background process in entrypoint.sh - now managed by supervisord.
[program:vsock-bridge-dot]
command=/usr/bin/socat -d -d TCP-LISTEN:853,bind=1.1.1.1,reuseaddr,fork VSOCK-CONNECT:3:8530
autostart=true
autorestart=true
priority=2
stdout_logfile=/var/log/supervisor/vsock-dot.log
stderr_logfile=/var/log/supervisor/vsock-dot-err.log

# ── Cloudflared connection monitor ───────────────────────────────────────
# Continuously monitors the health of cloudflared edge connections.
# Logs port states, connection counts, TCP states, and bridge health every 15s.
[program:cloudflared-monitor]
command=/app/cloudflared-monitor.sh
autostart=true
autorestart=true
priority=51
stdout_logfile=/var/log/supervisor/cloudflared-monitor.log
stderr_logfile=/var/log/supervisor/cloudflared-monitor-err.log

# ── Export watcher (polls host HTTP for export requests) ─────────────────
# Primary export mechanism: polls seed HTTP server for export-request.json,
# runs export.sh, uploads completion marker via HTTP PUT. Replaces VSOCK
# trigger which was unreliable for long-running exports.
[program:export-watcher]
command=/app/export-watcher.sh
autostart=true
autorestart=true
priority=45
stdout_logfile=/var/log/supervisor/export-watcher.log
stderr_logfile=/var/log/supervisor/export-watcher-err.log

# ── Service watchdog ─────────────────────────────────────────────────────
[program:service-watchdog]
command=/app/service-watchdog.sh
autostart=true
autorestart=true
priority=5
stdout_logfile=/var/log/supervisor/service-watchdog.log
stderr_logfile=/var/log/supervisor/service-watchdog-err.log

# ── Diagnostic trigger (VSOCK port 9008) ─────────────────────────────────
# Host connects to enclave CID 16 port 9008 to get diagnostic dump.
# Usage from host: socat - VSOCK-CONNECT:16:9008
[program:diag-trigger]
command=/bin/bash -c "while true; do socat VSOCK-LISTEN:9008,reuseaddr EXEC:'/app/diagnose-enclave.sh',nofork 2>/dev/null; done"
autostart=true
autorestart=true
priority=3
stdout_logfile=/var/log/supervisor/diag-trigger.log
stderr_logfile=/var/log/supervisor/diag-trigger-err.log

# ── Post-boot verify (runs once after services start) ────────────────────
# Waits for backend health, runs verify.sh, uploads result to host via HTTP.
# Only does work if /data/seed/start-and-verify.sh or /data/seed/start-and-signal.sh exists
# (created by entrypoint.sh during restore or fresh start).
[program:post-boot-verify]
command=/app/post-boot-verify.sh
autostart=true
autorestart=false
startsecs=0
priority=99
stdout_logfile=/var/log/supervisor/post-boot-verify.log
stderr_logfile=/var/log/supervisor/post-boot-verify-err.log

# ── Cloudflared (Cloudflare tunnel) ──────────────────────────────────────
# Depends on vsock-bridge-7844 and vsock-bridge-dot being ready (priority 2).
# Wrapper script does pre-flight checks and unsets proxy vars before exec.
[program:cloudflared]
command=/app/cloudflared-wrapper.sh
environment=HTTP_PROXY="",HTTPS_PROXY="",http_proxy="",https_proxy="",NO_PROXY="*",no_proxy="*",CLOUDFLARE_TUNNEL_TOKEN="%(ENV_CLOUDFLARE_TUNNEL_TOKEN)s"
autostart=true
autorestart=true
startsecs=5
startretries=999
priority=50
stdout_logfile=/var/log/supervisor/cloudflared.log
stderr_logfile=/var/log/supervisor/cloudflared-err.log
stdout_logfile_maxbytes=10MB
stderr_logfile_maxbytes=10MB
